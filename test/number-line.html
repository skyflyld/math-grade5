<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Line Demo</title>
<link rel="stylesheet" href="../shared/layout.css">
</head>
<body>
<div class="top-nav"><a href="../index.html">首页</a><span class="breadcrumb-sep">›</span><span>number-line demo</span></div>
<h1 class="module-title">数轴组件 Demo</h1>
<p class="module-subtitle">拖拽游标、点击跳跃按钮，观察整数、小数、分数在同一条线上移动。</p>
<div id="number-line-demo"></div>
<script src="../shared/components.js"></script>
<script>
createNumberLine({
  containerId:'number-line-demo',
  title:'分数小数双标尺',
  description:'每格 0.25，既能写作小数，也能读作分数。',
  min:0,
  max:2,
  step:0.25,
  initial:0.5,
  fractionTicks:true,
  fractionDenominator:4,
  jumps:[0.25,-0.25,0.5],
  markers:[{value:1,label:'1',color:'#f97316'},{value:1.5,label:'3/2',color:'#22c55e'}]
});
</script>
</body>
</html>
