<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>植树问题 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="植树问题"><div class="top-nav"><a href="../../index.html#%E6%A4%8D%E6%A0%91%E9%97%AE%E9%A2%98">🏠</a><span class="breadcrumb-sep">›</span><span>植树问题</span></div>
<h1 class="module-title">🌳 植树问题 — 间隔与端点</h1><p class="module-subtitle">路长÷间距=间隔数，棵数取决于两端有没有树。间隔是关键。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div>
<div class="visual-step"><span class="step-label">第 1 步</span><h4>三种情况</h4><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;"><div style="padding:12px;background:#dbeafe;border-radius:8px;"><strong>两端都栽</strong><br>棵数=间隔数+1</div><div style="padding:12px;background:#fef3c7;border-radius:8px;"><strong>一端不栽</strong><br>棵数=间隔数</div><div style="padding:12px;background:#fca5a5;border-radius:8px;"><strong>两端不栽</strong><br>棵数=间隔数-1</div></div><div class="thought-bubble">100米路每5米一棵→间隔20个。两端都栽21棵，一端栽20棵，都不栽19棵。</div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">间隔数=总长÷间距，棵数±看端点</span></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 60米每5米两端都栽→60÷5=12间隔，棵数=13</h4>✏️ 两端都不栽→棵数？<input class="input-field" id="ex1" style="width:40px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'11',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div><div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'两端都栽，棵数=间隔数？',inputs:[{key:'a',width:30}],check:u=>u.a==='+1'||u.a==='多1'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'混淆',statement:'植树问题的关键是路长。',answer:'refute',hint:'先算什么？',explanation:'关键算间隔数（路长÷间距），端点情况决定棵数公式。',counterexample:'100÷5=20间隔，两端都栽=21棵'}],onComplete:()=>saveProgress({'app':{'trees':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'植树问题三步：①路长÷间距=___数。②看___情况。③两端都栽=间隔数___1。',answer:['间隔','端点','+'],onComplete:()=>saveProgress({'app':{'trees':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'100米每5米两端都栽，棵数？',inputs:[{key:'a',width:40}],check:a=>a.a==='21'},{question:'100米每5米两端都不栽，棵数？',inputs:[{key:'a',width:40}],check:a=>a.a==='19'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'50米每5米一端不栽，棵数？',inputs:[{key:'a',width:40}],check:a=>a.a==='10'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'app':{'trees':{'completed':true}}});}});}
</script>
</body>
</html>
