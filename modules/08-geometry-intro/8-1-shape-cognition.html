<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图形认知 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="图形认知"><div class="top-nav"><a href="../../index.html#%E5%9B%BE%E5%BD%A2%E8%AE%A4%E7%9F%A5">🏠</a><span class="breadcrumb-sep">›</span><span>图形认知</span></div>
<h1 class="module-title">🔷 图形认知 — 边和角</h1><p class="module-subtitle">三角形三条边、正方形四条边——理解图形就是理解边和角。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div>
<div class="visual-step"><span class="step-label">第 1 步</span><h4>图形=封闭的折线或曲线</h4><div class="thought-bubble">三角形=3边3角，正方形=4边4角，圆=一条封闭曲线没角。</div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>分类</h4><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;"><div style="padding:10px;background:#dbeafe;border-radius:8px;"><strong>三角形</strong><br>3边3角，180°</div><div style="padding:10px;background:#fef3c7;border-radius:8px;"><strong>四边形</strong><br>4边4角，360°</div><div style="padding:10px;background:#dcfce7;border-radius:8px;"><strong>多边形</strong><br>n边n角，(n-2)×180°</div><div style="padding:10px;background:#fce7f3;border-radius:8px;"><strong>圆</strong><br>封闭曲线，无角</div></div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">所有多边形都由边和角决定</span></div></div></div>
<div class="section">
  <div class="section-header"><span class="emoji">🎮</span>交互实验室</div>
  <div id="shape-lab"></div>
</div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 五边形几个角？</h4>✏️ <input class="input-field" id="ex1" style="width:40px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'5',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div>
<div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'三角形几条边？',inputs:[{key:'a',width:30}],check:u=>u.a==='3'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'分类',statement:'正方形是特殊的长方形。',answer:'agree',hint:'检查所有条件',explanation:'四边相等、四个直角→满足长方形全部条件。'}],onComplete:()=>saveProgress({'geo':{'cognition':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'图形由___和___组成。三角形___条边，四边形___条边。',answer:['边','角','3','4'],onComplete:()=>saveProgress({'geo':{'cognition':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'六边形几条边？',inputs:[{key:'a',width:40}],check:a=>a.a==='6'},{question:'三角形内角和？',inputs:[{key:'a',width:40}],check:a=>a.a==='180°'||a.a==='180'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'四边形的内角和？',inputs:[{key:'a',width:40}],check:a=>a.a==='360°'||a.a==='360'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'geo':{'cognition':{'completed':true}}});}});}
(function sprint4Batch2Enrichment(){
  function norm(v){return String(v||'').replace(/\s/g,'');}
  function ensureTier(){
    const adv=document.getElementById('tier-adv');
    let mix=document.getElementById('tier-mix');
    if(!mix&&adv){
      mix=document.createElement('div');
      mix.className='exercise-tier';
      mix.id='tier-mix';
      mix.style.display='none';
      mix.innerHTML='<h3><span class="tier-badge challenge">综合</span></h3><div id="ex-mix"></div>';
      adv.insertAdjacentElement('afterend',mix);
    }
    const done=document.getElementById('done');
    if(done)done.style.display='none';
    return mix;
  }

  createSymmetryBoard({
    containerId:'shape-lab',
    title:'图形变换实验',
    description:'把图形旋转或镜像一下：名字变吗？边数和角数变吗？',
    mode:'mirror',
    angle:90
  });

  document.getElementById('adversary-root').innerHTML='';
  createAdversarialChallenge({containerId:'adversary-root',challenges:[
    {tag:'分类边界',statement:'长方形和正方形是两类不同的图形。',answer:'refute',hint:'正方形满足长方形的所有条件吗？',explanation:'正方形是特殊的长方形，包含关系，不是并列关系。',counterexample:'所有正方形都是长方形，反之不一定。'},
    {tag:'梯形定义',statement:'只有一组对边平行的四边形叫梯形，所以长方形也是梯形。',answer:'refute',hint:'长方形有几组对边平行？',explanation:'长方形两组对边都平行。梯形要求“只有一组”。',counterexample:'长方形属于平行四边形，不是梯形。'},
    {tag:'三角形分类',statement:'一个三角形要么是锐角三角形，要么是直角三角形，要么是钝角三角形。',answer:'agree',hint:'有没有三角形不属于这三种？',explanation:'按最大角分类，必然属于其中之一，互斥且穷尽。',counterexample:'最大角 <90° / =90° / >90° 覆盖全部。'},
    {tag:'逆向思考',statement:'一个四边形四个角都是直角，它一定是正方形。',answer:'refute',hint:'长方形四个角也是直角。',explanation:'四个直角可推出是矩形；正方形还要求四边相等。',counterexample:'长方形 5×3，四角直角但不是正方形。'}
  ],onComplete:()=>saveProgress({'geo':{'cognition':{'adversary':'complete'}}})});

  document.getElementById('feynman-root').innerHTML='';
  createFeynmanFill({containerId:'feynman-root',
    template:'第1句：图形按___分类：三角形有___条边，四边形有___条边。第2句：正方形是特殊的___形和特殊的___形，不是___立的一类。第3句：按角的类型，三角形分为___角三角形、___角三角形和___角三角形。第4句：一个图形旋转后，它的___不变。',
    answer:['边','3','4','长方','菱','独','锐','直','钝','形状属性'],
    onComplete:()=>saveProgress({'geo':{'cognition':{'feynman':'complete'}}})
  });

  ensureTier();
  document.getElementById('ex-basic').innerHTML='';
  document.getElementById('ex-adv').innerHTML='';
  createExerciseSet({containerId:'ex-basic',exercises:[
    {question:'四条边相等、四个角都是直角的图形叫（ ）。',inputs:[{key:'a',width:120}],check:a=>norm(a.a)==='正方形',expected:'正方形'},
    {question:'等边三角形按角分属于（ ）三角形。',inputs:[{key:'a',width:120}],check:a=>norm(a.a)==='锐角'||norm(a.a)==='锐角三角形',expected:'锐角三角形'},
    {question:'长方形是特殊的（ ）。',inputs:[{key:'a',width:140}],check:a=>norm(a.a)==='平行四边形',expected:'平行四边形'}
  ],passThreshold:0.67,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdvEnhanced();}});

  function initAdvEnhanced(){
    document.getElementById('ex-adv').innerHTML='';
    createExerciseSet({containerId:'ex-adv',exercises:[
      {question:'一个四边形两组对边分别平行，它是（ ）。',inputs:[{key:'a',width:160}],check:a=>norm(a.a)==='平行四边形',expected:'平行四边形'},
      {question:'正方形既是（ ）形又是（ ）形。',inputs:[{key:'a',width:180}],check:a=>{const v=norm(a.a);return v.includes('长方形')&&v.includes('菱形');},expected:'长方形、菱形'},
      {question:'直角三角形的另两个角一定是（ ）角。',inputs:[{key:'a',width:120}],check:a=>norm(a.a)==='锐角',expected:'锐角'}
    ],passThreshold:0.67,onPass:()=>{document.getElementById('tier-mix').style.display='block';initMixEnhanced();}});
  }

  function initMixEnhanced(){
    document.getElementById('ex-mix').innerHTML='';
    createExerciseSet({containerId:'ex-mix',exercises:[
      {question:'画一个既不是长方形也不是菱形的平行四边形。（填“可以/不可以”即可）',inputs:[{key:'a',width:120}],check:a=>{const v=norm(a.a);return v==='可以'||v==='能'||v==='可以画';},expected:'可以'},
      {question:'所有的等边三角形都是锐角三角形吗？（是/否）',inputs:[{key:'a',width:60}],check:a=>['是','对','yes','Y'].includes(norm(a.a)),expected:'是'},
      {question:'一个三角形有两个角分别是30°和60°，它是什么三角形？',inputs:[{key:'a',width:140}],check:a=>{const v=norm(a.a);return v.includes('直角');},expected:'直角三角形'}
    ],passThreshold:0.67,onPass:()=>{const done=document.getElementById('done');done.style.display='block';celebrate(done);saveProgress({'geo':{'cognition':{'completed':true}}});}});
  }
})();
</script>
</body>
</html>
