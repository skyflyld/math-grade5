<body data-concept="轴对称与旋转"><div class="top-nav"><a href="../../index.html#%E8%BD%B4%E5%AF%B9%E7%A7%B0%E4%B8%8E%E6%97%8B%E8%BD%AC">🏠</a><span class="breadcrumb-sep">›</span><span>轴对称与旋转</span></div>
<h1 class="module-title">🪞 轴对称与旋转 — 图形变换</h1><p class="module-subtitle">对折重合叫对称，绕点转圈叫旋转。图形位置变了，但大小和形状不变。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div>
<div class="visual-step"><span class="step-label">第 1 步</span><h4>轴对称 — 对折能重合</h4><div class="thought-bubble">蝴蝶左右对称——沿中轴对折，两边完全重合。那条线叫对称轴。正方形有4条对称轴，长方形有2条。</div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>旋转 — 绕一个点转动</h4><div class="thought-bubble">风车绕中心旋转。旋转三要素：中心点、方向（顺时针/逆时针）、角度（90°、180°等）。</div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">变换不改变图形的大小和形状——只改变位置</span></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 正方形有几条对称轴？4条</h4>✏️ 等边三角形有？<input class="input-field" id="ex1" style="width:40px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'3',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div>
<div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'正方形有几条对称轴？',inputs:[{key:'a',width:30}],check:u=>u.a==='4'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'特性',statement:'旋转后图形的大小改变了。',answer:'refute',hint:'旋转和翻折改变什么？',explanation:'旋转只改变位置和方向，不改变大小和形状。',counterexample:'旋转90°的正方形边长不变。'}],onComplete:()=>saveProgress({'geo':{'symmetry':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'轴对称图形沿___对折，两边完全___。旋转三要素：___、方向、___。',answer:['对称轴','重合','中心点','角度'],onComplete:()=>saveProgress({'geo':{'symmetry':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'正方形有几条对称轴？',inputs:[{key:'a',width:40}],check:a=>a.a==='4'},{question:'长方形有几条对称轴？',inputs:[{key:'a',width:40}],check:a=>a.a==='2'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'圆有几条对称轴？',inputs:[{key:'a',width:40}],check:a=>a.a==='无数'||a.a==='无数条'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'geo':{'symmetry':{'completed':true}}});}});}
</script>
</body>
</html>
