<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>观察物体 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="观察物体"><div class="top-nav"><a href="../../index.html#%E8%A7%82%E5%AF%9F%E7%89%A9%E4%BD%93">🏠</a><span class="breadcrumb-sep">›</span><span>观察物体</span></div>
<h1 class="module-title">👁️ 观察物体 — 三视图</h1><p class="module-subtitle">前、上、左三个方向看同一个立体，看到的形状可能不同。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div>
<div class="visual-step"><span class="step-label">第 1 步</span><h4>同一个物体，不同角度看不同</h4><div class="thought-bubble">圆柱正面看是长方形，上面看是圆形。球从任何方向看都是圆形。</div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>三视图</h4><div style="display:flex;gap:12px;justify-content:center;"><div style="padding:12px;background:#dbeafe;border-radius:8px;text-align:center;"><strong>正视图</strong><br>前面看</div><div style="padding:12px;background:#fef3c7;border-radius:8px;text-align:center;"><strong>俯视图</strong><br>上面看</div><div style="padding:12px;background:#dcfce7;border-radius:8px;text-align:center;"><strong>侧视图</strong><br>左面看</div></div></div>
<div class="visual-step"><span class="step-label">动态投影</span><h4>换一个积木，三张投影图也跟着变</h4><div id="three-view-demo"></div><div id="observe-core-hint"></div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">每个方向的视图=在这个方向"看到的投影形状"</span></div></div></div>
<div class="section">
  <div class="section-header"><span class="emoji">🎮</span>交互实验室 · 旋转观察</div>
  <div id="observe-lab"></div>
</div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 球从上面看是什么形？</h4>✏️ <input class="input-field" id="ex1" style="width:40px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'圆形',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div><div id="observe-explain-1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div>
<div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<div id="course-summary"></div>
<div class="next-lesson-card" id="next-lesson" style="display:none;"></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'不同方向看相同物体，形状一定一样吗？',inputs:[{key:'a',width:30}],check:u=>u.a==='不一定'||u.a==='不同'||u.a==='否'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
createThreeViewDemo({containerId:'three-view-demo'});
addHintButton('observe-core-hint','先固定观察方向，再把看不见的深度压扁成平面图。三视图不是画立体本身，而是画“投影”。','三视图怎么想');
addExplanation('observe-explain-1','球没有棱和面，从上面、前面、左面看轮廓都一样，所以看到的是圆形。');
createCourseSummary({containerId:'course-summary'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'三视图',statement:'圆柱从任何方向看都是长方形。',answer:'refute',hint:'从上面看呢？',explanation:'从上面看是圆形（不是长方形）。',counterexample:'正面□，上面○'}],onComplete:()=>saveProgress({'geo':{'observe':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'三视图：从___面看为正视图，从___面看为俯视图，从___面看为侧视图。不同方向看到的形状可能___。',answer:['前','上','左','不同'],onComplete:()=>saveProgress({'geo':{'observe':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'球从任何方向看是？',inputs:[{key:'a',width:40}],check:a=>a.a==='圆形'},{question:'正方体从正面看是？',inputs:[{key:'a',width:40}],check:a=>a.a==='正方形'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'圆柱从上面看是？',inputs:[{key:'a',width:40}],check:a=>a.a==='圆形'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'geo':{'observe':{'completed':true}}});createNextLessonSuggestion({containerId:'next-lesson'});}});}
(function sprint4Batch2Enrichment(){
  function norm(v){return String(v||'').replace(/\s/g,'');}
  function ensureTier(){
    const adv=document.getElementById('tier-adv');
    let mix=document.getElementById('tier-mix');
    if(!mix&&adv){
      mix=document.createElement('div');
      mix.className='exercise-tier';
      mix.id='tier-mix';
      mix.style.display='none';
      mix.innerHTML='<h3><span class="tier-badge challenge">综合</span></h3><div id="ex-mix"></div>';
      adv.insertAdjacentElement('afterend',mix);
    }
    const done=document.getElementById('done');
    if(done)done.style.display='none';
    return mix;
  }

  createSymmetryBoard({
    containerId:'observe-lab',
    title:'投影与旋转（近似演示）',
    description:'拖动角度滑条：同一个图形从不同方向“看”，投影外观会变化。',
    mode:'rotate',
    angle:90
  });

  document.getElementById('adversary-root').innerHTML='';
  createAdversarialChallenge({containerId:'adversary-root',challenges:[
    {tag:'视图不同',statement:'从不同方向看同一个物体，看到的形状一定不同。',answer:'refute',hint:'正方体从各方向看是什么？',explanation:'不一定。正方体从任何方向看都是正方形；球从任何方向看都是圆形。',counterexample:'同一物体可能多个方向投影相同。'},
    {tag:'唯一性',statement:'三视图完全确定后，物体的摆法也就唯一确定了。',answer:'refute',hint:'只看两个视图可能有多种摆法。',explanation:'三视图有时也不能唯一确定立体结构，可能存在多种摆法。',counterexample:'正视图和俯视图相同的情况下，内部堆叠可能不同。'},
    {tag:'俯视图',statement:'俯视图看到的是物体的顶部形状，所以画不出正方体堆叠的层数。',answer:'agree',hint:'俯视图只能看到最上面一层。',explanation:'俯视图是投影，只能看到顶面轮廓，不能直接看出下面还有几层。',counterexample:'可在格子里标数字表示该列方块数量。'},
    {tag:'逆向思考',statement:'正视图是3个正方形排成一排，物体可能是3个方块排成一行。',answer:'agree',hint:'还有别的可能吗？',explanation:'可能是3个排一行，也可能是3层叠一列（侧视图会不同）。',counterexample:'要唯一确定需要综合更多视图信息。'}
  ],onComplete:()=>saveProgress({'geo':{'observe':{'adversary':'complete'}}})});

  document.getElementById('feynman-root').innerHTML='';
  createFeynmanFill({containerId:'feynman-root',
    template:'第1句：从不同方向观察物体，是对它做___投影。第2句：三视图包括___视图（前面）、___视图（上面）、___视图（侧面）。第3句：俯视图只能看到___层，看不到___面有几层。第4句：从两个视图可能推出___种摆法，所以要综合___个视图判断。',
    answer:['二维','正','俯','侧','最高','下面','多','三'],
    onComplete:()=>saveProgress({'geo':{'observe':{'feynman':'complete'}}})
  });

  ensureTier();
  document.getElementById('ex-basic').innerHTML='';
  document.getElementById('ex-adv').innerHTML='';
  createExerciseSet({containerId:'ex-basic',exercises:[
    {question:'从前面看3个方块排成一行，正视图是什么？',inputs:[{key:'a',width:150}],check:a=>{const v=norm(a.a);return v.includes('3')&&v.includes('正方形');},expected:'3个正方形排一排'},
    {question:'单个正方体从上面看是什么形状？',inputs:[{key:'a',width:90}],check:a=>norm(a.a)==='正方形',expected:'正方形'},
    {question:'三视图中的“侧视图”通常从哪边看？',inputs:[{key:'a',width:120}],check:a=>{const v=norm(a.a);return v.includes('左')||v.includes('右');},expected:'左边或右边'}
  ],passThreshold:0.67,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdvEnhanced();}});

  function initAdvEnhanced(){
    document.getElementById('ex-adv').innerHTML='';
    createExerciseSet({containerId:'ex-adv',exercises:[
      {question:'4个方块摆成2×2正方形，俯视图是什么？',inputs:[{key:'a',width:120}],check:a=>{const v=norm(a.a);return v.includes('2×2')||v.includes('2x2')||v.includes('正方形');},expected:'2×2正方形'},
      {question:'正视图2个正方形、俯视图2个正方形排一列，最少需要几个方块？',inputs:[{key:'a',width:60}],check:a=>norm(a.a)==='2'||norm(a.a)==='2个',expected:'2个'},
      {question:'只给正视图和俯视图，能确定所有摆法吗？（能/不能/不一定）',inputs:[{key:'a',width:80}],check:a=>{const v=norm(a.a);return v.includes('不')||v.includes('不能')||v.includes('不一定');},expected:'不一定'}
    ],passThreshold:0.67,onPass:()=>{document.getElementById('tier-mix').style.display='block';initMixEnhanced();}});
  }

  function initMixEnhanced(){
    document.getElementById('ex-mix').innerHTML='';
    createExerciseSet({containerId:'ex-mix',exercises:[
      {question:'用5个小正方体，正视图3个一排、俯视图呈L形，有几种摆法？（填“多种/一种”）',inputs:[{key:'a',width:80}],check:a=>norm(a.a).includes('多'),expected:'多种'},
      {question:'为什么工程制图需要三视图而不是一张图？',inputs:[{key:'a',width:180}],check:a=>norm(a.a).length>=2,expected:'一个角度信息不全'},
      {question:'什么样的物体从三个方向看完全一样？',inputs:[{key:'a',width:120}],check:a=>{const v=norm(a.a);return v.includes('正方体')||v.includes('球');},expected:'正方体/球体'}
    ],passThreshold:0.67,onPass:()=>{const done=document.getElementById('done');done.style.display='block';celebrate(done);saveProgress({'geo':{'observe':{'completed':true}}});}});
  }
})();
</script>
</body>
</html>
