<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>折线统计图 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="折线统计图"><div class="top-nav"><a href="../../index.html#%E6%8A%98%E7%BA%BF%E7%BB%9F%E8%AE%A1%E5%9B%BE">🏠</a><span class="breadcrumb-sep">›</span><span>折线统计图</span></div>
<h1 class="module-title">📈 折线统计图 — 趋势山脊</h1><p class="module-subtitle">和数据条相比，折线图最大的优点是能直观地看出上升或下降趋势。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div>
<div class="visual-step"><span class="step-label">第 1 步</span><h4>点+线=趋势</h4><div class="thought-bubble">每个数据点一个位置，连成线。线越陡，变化越快。温度从10°升到25°——线的上升能看出天气在变暖。</div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>与条形图的区别</h4><div style="display:flex;gap:12px;justify-content:center;"><div style="padding:12px;background:#dbeafe;border-radius:8px;"><strong>条形图</strong><br>比大小</div><div style="padding:12px;background:#fef3c7;border-radius:8px;"><strong>折线图</strong><br>看趋势</div></div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">折线图最擅长展示"随时间的变化"</span></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 折线统计图中线上升表示什么？数据增加</h4>✏️ 线越陡表示？<input class="input-field" id="ex1" style="width:60px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'变化越快',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div><div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'折线图适合展示什么？',inputs:[{key:'a',width:40}],check:u=>u.a.includes('趋势')||u.a.includes('变化')}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'对比',statement:'条形图比折线图更适合展示变化趋势。',answer:'refute',hint:'什么图更适合看趋势？',explanation:'折线图是用线段连接数据点，最能直观反映升降趋势。',counterexample:'全年气温变化用折线图比条形图更直观。'}],onComplete:()=>saveProgress({'stats':{'line-chart':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'折线统计图由___和连接它们的___组成。线向___走表示上升，向___走表示下降。和条形图比，折线图更擅长展示___。',answer:['数据点','线段','上','下','趋势'],onComplete:()=>saveProgress({'stats':{'line-chart':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'折线向上表示？',inputs:[{key:'a',width:40}],check:a=>a.a==='上升'||a.a==='增加'},{question:'折线向下表示？',inputs:[{key:'a',width:40}],check:a=>a.a==='下降'||a.a==='减少'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'某市1月5℃、7月30℃，折线呈什么趋势？',inputs:[{key:'a',width:40}],check:a=>a.a==='上升'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'stats':{'line-chart':{'completed':true}}});}});}
</script>
</body>
</html>
