<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>可能性 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="可能性"><div class="top-nav"><a href="../../index.html#%E5%8F%AF%E8%83%BD%E6%80%A7">🏠</a><span class="breadcrumb-sep">›</span><span>可能性</span></div>
<h1 class="module-title">🎲 可能性 — 机会区域</h1><p class="module-subtitle">骰子、转盘、抽签——有些事一定会发生，有些可能发生，有些不可能。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div><div class="visual-step"><span class="step-label">第 1 步</span><h4>三类事件</h4><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><div style="padding:14px;background:#dcfce7;border-radius:8px;"><strong>必然</strong><br>一定发生</div><div style="padding:14px;background:#fef3c7;border-radius:8px;"><strong>可能</strong><br>有时发生</div><div style="padding:14px;background:#fca5a5;border-radius:8px;"><strong>不可能</strong><br>绝不会发生</div></div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>用分数表示可能性</h4><div class="thought-bubble">骰子掷出3的可能性=1/6（6种可能中1种）。必然事件=1，不可能事件=0。</div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">可能性=有利结果数÷全部可能结果数</span></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 掷硬币正面朝上的可能性？1/2</h4>✏️ 骰子掷出6的可能性？<input class="input-field" id="ex1" style="width:40px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'1/6',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div><div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'太阳每天从东边升起——这属于什么事件？',inputs:[{key:'a',width:30}],check:u=>u.a==='必然'||u.a==='必然事件'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'概率',statement:'掷骰子6次，一定出现一次6。',answer:'refute',hint:'每掷一次的概率是多少？',explanation:'每次都是1/6，但不保证6次中会出现。',counterexample:'可能掷10次都不出现6。'}],onComplete:()=>saveProgress({'stats':{'probability':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'可能性分为___事件（一定）、___事件（可能）、___事件（绝不）。用分数表示时，分子是___结果数，分母是___结果数。',answer:['必然','可能','不可能','有利','全部可能'],onComplete:()=>saveProgress({'stats':{'probability':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'掷硬币正面的可能性？',inputs:[{key:'a',width:40}],check:a=>a.a==='1/2'},{question:'必然事件可能性是？',inputs:[{key:'a',width:40}],check:a=>a.a==='1'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'袋中有3红2蓝，摸到红的可能性？',inputs:[{key:'a',width:40}],check:a=>a.a==='3/5'}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'stats':{'probability':{'completed':true}}});}});}
</script>
</body>
</html>
