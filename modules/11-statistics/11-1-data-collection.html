<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数据收集 · 五年级</title><link rel="stylesheet" href="../../shared/layout.css"><style>.visual-step{background:linear-gradient(145deg,#f8fafc,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;}.visual-step h4{font-size:17px;margin-bottom:12px;}.visual-step .step-label{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent-deep);margin-bottom:10px;}.concept-highlight{background:linear-gradient(145deg,#fefce8,#fff);border:2px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin:16px 0;text-align:center;}.concept-highlight .big-idea{font-size:22px;font-weight:800;color:#92400e;line-height:1.6;}.concept-highlight .big-idea .highlight{color:var(--accent-deep);background:var(--accent-light);padding:2px 8px;border-radius:4px;}.thought-bubble{display:inline-block;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin:6px 0;font-size:14px;max-width:90%;}.thought-bubble::before{content:'💭 ';}</style></head>
<body data-concept="数据收集"><div class="top-nav"><a href="../../index.html#%E6%95%B0%E6%8D%AE%E6%94%B6%E9%9B%86">🏠</a><span class="breadcrumb-sep">›</span><span>数据收集</span></div>
<h1 class="module-title">📋 数据收集 — 把信息装进格子</h1><p class="module-subtitle">杂乱的数据放进表格，才能看清数字背后的规律。</p>
<div class="section"><div class="section-header"><span class="emoji">🔑</span>预热</div><div id="gate-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🧱</span>拆到公理</div><div class="visual-step"><span class="step-label">第 1 步</span><h4>数据→表格→信息</h4><div class="thought-bubble">全班同学身高：直接看一堆数字很难发现规律。按身高分组做成表→一目了然。</div></div>
<div class="visual-step"><span class="step-label">第 2 步</span><h4>两种统计表</h4><div style="display:flex;gap:12px;justify-content:center;"><div style="padding:12px;background:#dbeafe;border-radius:8px;"><strong>单式</strong><br>一栏数据</div><div style="padding:12px;background:#fef3c7;border-radius:8px;"><strong>复式</strong><br>多栏对比</div></div></div>
<div class="concept-highlight"><div class="big-idea">🔑 <span class="highlight">整理数据的目的是为了发现规律</span></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">🎯</span>典例精讲</div><div class="visual-step"><h4>🎯 统计表中"合计"是什么？所有数据之和</h4>✏️ 统计表的第一行通常叫什么？<input class="input-field" id="ex1" style="width:50px;"><button class="btn btn-primary btn-sm" onclick="checkE(1,'表头',ex1,fb1)">提交</button><div class="feedback" id="fb1"></div></div></div>
<div class="section"><div class="section-header"><span class="emoji">⚡</span>对抗挑战</div><div id="adversary-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">🦜</span>费曼输出</div><div id="feynman-root"></div></div>
<div class="section"><div class="section-header"><span class="emoji">📝</span>练习</div>
<div class="exercise-tier"><h3><span class="tier-badge basic">基础</span></h3><div id="ex-basic"></div></div><div class="exercise-tier" id="tier-adv" style="display:none;"><h3><span class="tier-badge advanced">提升</span></h3><div id="ex-adv"></div></div>
<div id="done" style="display:none;text-align:center;padding:24px;font-size:24px;">🎉 通关！</div></div>
<script src="../../shared/concepts.js"></script><script src="../../shared/concept-sync.js"></script><script src="../../shared/components.js"></script>
<script>
createGate({containerId:'gate-root',questions:[{label:'数据整理后放在哪里？',inputs:[{key:'a',width:40}],check:u=>u.a==='表格'||u.a==='统计表'||u.a==='表'}],onPass:()=>document.getElementById('gate-root').innerHTML='✅'});
function checkE(n,ans,i,f){const ok=i.value.trim()===ans;f.className='feedback show '+(ok?'success':'error');f.innerHTML=ok?'✅':`❌ ${ans}`;}
createAdversarialChallenge({containerId:'adversary-root',challenges:[{tag:'目的',statement:'收集数据只是为了记录。',answer:'refute',hint:'记录之后做什么？',explanation:'收集是为了整理和分析，不是为记录而记录。',counterexample:'记录身高后要分组看分布规律。'}],onComplete:()=>saveProgress({'stats':{'collect':{'adversary':'complete'}}})});
createFeynmanFill({containerId:'feynman-root',template:'数据收集就是___信息，放进___里面。整理数据的目的是为了发现___。',answer:['收集','表格','规律'],onComplete:()=>saveProgress({'stats':{'collect':{'feynman':'complete'}}})});
createExerciseSet({containerId:'ex-basic',exercises:[{question:'统计表有哪两种？',inputs:[{key:'a',width:60}],check:a=>a.a==='单式和复式'||a.a==='单式复式'}],passThreshold:0.5,onPass:()=>{document.getElementById('tier-adv').style.display='block';initAdv();}});
function initAdv(){createExerciseSet({containerId:'ex-adv',exercises:[{question:'班级兴趣小组统计表的"合计"意义？',inputs:[{key:'a',width:60}],check:a=>a.a.includes('总')||a.a.includes('和')}],passThreshold:0.5,onPass:()=>{document.getElementById('done').style.display='block';celebrate(document.getElementById('done'));saveProgress({'stats':{'collect':{'completed':true}}});}});}
</script>
</body>
</html>
