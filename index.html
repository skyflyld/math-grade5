<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五年级数学 · 概念星图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="shared/concepts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --number-ops:#4A90D9;--geometry:#E85D75;--algebra:#7B68EE;
  --statistics:#F0A050;--applications:#50B87A;
  --bg:#f7f9fb;--surface:#fffdf9;--text:#1f2937;--text-dim:#667085;
  --card-bg:#fffdf9;--border:#eadfce;--accent:#f5a400;--green:#45c77a;
  --shadow:0 12px 34px rgba(31,41,55,.12);--soft-shadow:0 8px 24px rgba(70,80,96,.10);
}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#app{display:flex;flex-direction:column;height:100dvh;min-height:0}
header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);z-index:12;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;min-width:280px}
.brand-icon{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#f2df4b,#62d184);box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);font-size:24px}
header h1{font-size:1.18em;font-weight:760;white-space:nowrap;letter-spacing:0}
.tagline{font-size:.82em;color:var(--text-dim);margin-top:2px;white-space:nowrap}
.stats{display:flex;align-items:baseline;gap:6px;color:var(--text-dim);font-size:.86em;white-space:nowrap}
.stats strong{font-size:1.05em;color:#1f2937;margin-left:10px}
.filter-panel{padding:14px 28px 12px;background:rgba(255,253,249,.96);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(31,41,55,.04);z-index:11;flex-shrink:0}
.filter-title{display:flex;align-items:center;gap:8px;font-weight:760;margin-bottom:12px}
.filter-title span{font-size:1.2em}
.filter-grid{display:grid;gap:12px}
.filter-block{display:grid;grid-template-columns:56px 1fr;align-items:center;gap:10px}
.filter-block label{font-size:.82em;font-weight:700;color:var(--text-dim);position:relative}
.filter-block label::after{content:"";position:absolute;left:52px;right:-8px;top:50%;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.filters,.semester-toggle{display:flex;gap:8px;flex-wrap:wrap}
.filters button,.semester-toggle button{display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:17px;background:#fff;color:#2f3a4a;cursor:pointer;font-size:.86em;font-weight:700;transition:all .18s;white-space:nowrap;box-shadow:0 1px 4px rgba(31,41,55,.04)}
.filters button::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--chip-color,#9aa6b2)}
.filters button[data-cat="all"]::before{display:none}
.filters button[data-cat="number_ops"]{--chip-color:var(--number-ops)}
.filters button[data-cat="geometry"]{--chip-color:var(--geometry)}
.filters button[data-cat="algebra"]{--chip-color:var(--algebra)}
.filters button[data-cat="statistics"]{--chip-color:var(--statistics)}
.filters button[data-cat="applications"]{--chip-color:var(--applications)}
.filters button:hover,.semester-toggle button:hover{transform:translateY(-1px);border-color:#d6c8b2;box-shadow:var(--soft-shadow)}
.filters button.active{background:#8e8e8e;color:#fff;border-color:#8e8e8e}
.semester-toggle button.active{background:var(--green);color:#fff;border-color:var(--green)}
#graph{flex:1;position:relative;cursor:grab;min-height:0;background:radial-gradient(circle at center,#ffffff 0,#f8fbfc 48%,#f2f6f7 100%)}
#graph:active{cursor:grabbing}
#graph svg{width:100%;height:100%;display:block}
.node-label{font-size:11px;fill:#2f3a4a;pointer-events:none;text-anchor:middle;font-weight:800;paint-order:stroke;stroke:#fff;stroke-width:4px;stroke-linejoin:round}
line.edge{stroke:#8191a6;stroke-width:1.5;stroke-opacity:.68}
line.edge.related{stroke-dasharray:5 4;stroke-opacity:.55}
line.edge.highlighted{stroke:var(--accent);stroke-width:3;stroke-opacity:1}
line.edge.dimmed{stroke-opacity:.08}
line.edge.hovered{stroke:var(--accent);stroke-width:3;stroke-opacity:1}
#tooltip{position:absolute;padding:10px 14px;background:#fff;border:1px solid var(--border);border-radius:10px;font-size:.82em;max-width:300px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;line-height:1.6;box-shadow:var(--soft-shadow)}
#tooltip .tt-cat{font-size:.7em;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
#tooltip .tt-desc{margin-top:4px;color:var(--text-dim)}
#tooltip .tt-edge{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--accent);font-size:.78em}
#card-overlay{display:none}
#card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;width:min(92vw,520px);max-height:calc(100dvh - 36px);overflow-y:auto;box-shadow:var(--shadow)}
#card h2{font-size:1.28em;margin-bottom:4px}
#card .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72em;color:#fff;margin-bottom:12px}
#card .visual-hero{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin:12px 0;border:1px solid var(--border);background:#f2f6f7}
#card .visual-fallback{display:grid;grid-template-columns:84px 1fr;gap:14px;align-items:center;min-height:130px;margin:12px 0;padding:16px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(135deg,#fff7df,#f4fbff)}
#card .visual-symbol{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:#fff;box-shadow:inset 0 0 0 1px rgba(31,41,55,.08)}
#card .visual-copy strong{display:block;margin-bottom:4px}
#card .visual-copy span{display:block;color:var(--text-dim);font-size:.83em;line-height:1.55}
#card .mentor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
#card .mentor{display:grid;grid-template-columns:36px 1fr;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff}
#card .mentor img{width:36px;height:36px;border-radius:50%;object-fit:cover}
#card .mentor b{display:block;font-size:.78em}
#card .mentor span{display:block;color:var(--text-dim);font-size:.72em;line-height:1.35}
#card .section{margin-top:14px}
#card .section h4{font-size:.8em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
#card .section .item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85em}
#card .section .item .arrow{color:var(--accent);margin:0 4px}
#card .section .item .exp{display:block;font-size:.78em;color:var(--text-dim);margin-top:2px}
#card .close-btn{float:right;background:none;border:none;color:var(--text-dim);font-size:1.3em;cursor:pointer;padding:0 4px}
#card .close-btn:hover{color:var(--text)}
.detail-panel{position:absolute;top:16px;right:72px;z-index:7;width:min(390px,calc(100% - 210px));max-height:calc(100% - 32px);overflow:hidden;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translateX(14px);transition:opacity .18s,transform .18s;display:flex;flex-direction:column}
.detail-panel.open{opacity:1;pointer-events:auto;transform:translateX(0)}
.detail-panel .detail-header{position:sticky;top:0;z-index:2;padding:16px 18px 12px;background:var(--card-bg);border-bottom:1px solid rgba(234,223,206,.72)}
.detail-panel .detail-scroll{overflow-y:auto;overflow-x:hidden;padding:0 18px 18px}
.detail-panel .detail-title{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.detail-panel .close-btn{background:none;border:none;color:var(--text-dim);font-size:1.25em;cursor:pointer;padding:0 4px;line-height:1}
.detail-panel .close-btn:hover{color:var(--text)}
.detail-panel h2{font-size:1.1em;margin-bottom:5px}
.detail-panel .badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72em;color:#fff;margin-bottom:10px}
.detail-panel .visual-hero{width:100%;max-width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin:10px 0;border:1px solid var(--border);background:#f2f6f7}
.detail-panel .core-line{margin-top:8px;color:var(--text-dim);font-size:.86em;line-height:1.55;overflow-wrap:anywhere}
.detail-panel .lesson-link{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0 4px;padding:11px 14px;border-radius:12px;background:linear-gradient(135deg,#f5a400,#fb923c);color:#fff;text-decoration:none;font-weight:800;font-size:.86em;box-shadow:0 8px 18px rgba(245,164,0,.22);max-width:100%}
.detail-panel .lesson-link:hover{filter:brightness(1.03);transform:translateY(-1px)}
.detail-panel .lesson-link span{font-size:.76em;font-weight:700;opacity:.9}
.detail-panel .lesson-note{margin-top:8px;padding:8px 10px;border-radius:10px;background:#fff8e8;color:#8a5a00;font-size:.76em;line-height:1.45}
.detail-panel .lesson-note b{display:block;margin-bottom:5px;color:#704300}
.detail-panel .lesson-note .priority-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
.detail-panel .priority-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#fff;color:#8a5a00;border:1px solid rgba(245,164,0,.35);font-weight:800}
.detail-panel .priority-pill.high{background:#fef3c7;color:#92400e}
.detail-panel .priority-pill.mid{background:#e0f2fe;color:#075985}
.detail-panel .priority-pill.low{background:#f1f5f9;color:#475569}
.detail-panel .lesson-note small{display:block;margin-top:4px;color:#9a6a12;line-height:1.45}
.detail-panel .focus-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0}
.detail-panel .focus-stat{min-width:0;padding:8px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:.78em}
.detail-panel .focus-stat strong{display:block;font-size:1.2em;color:#1f2937}
.detail-panel .mentor-row{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.detail-panel .mentor{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:center;padding:9px;border:1px solid var(--border);border-radius:11px;background:#fff}
.detail-panel .mentor img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.detail-panel .mentor b{display:block;font-size:.76em}
.detail-panel .mentor span{display:block;color:var(--text-dim);font-size:.72em;line-height:1.35}
.detail-panel .section{margin-top:12px}
.detail-panel .section h4{font-size:.76em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.detail-panel .section .item{padding:6px 0;border-top:1px solid rgba(31,41,55,.07);font-size:.82em}
.detail-panel .section .exp{display:block;color:var(--text-dim);font-size:.78em;line-height:1.45;margin-top:2px}
.detail-panel .relation-item{width:100%;border:0;border-top:1px solid rgba(31,41,55,.07);background:transparent;text-align:left;padding:8px 0;cursor:pointer;font:inherit;color:inherit}
.detail-panel .relation-item:first-of-type{border-top:0}
.detail-panel .relation-item:hover .relation-name{color:var(--accent)}
.detail-panel .relation-name{display:inline-flex;align-items:center;gap:4px;font-weight:800;transition:color .16s}
.detail-panel .relation-name::after{content:"›";color:var(--accent);font-weight:900}
.detail-panel .relation-exp{display:block;color:var(--text-dim);font-size:.78em;line-height:1.45;margin-top:2px}
.legend{position:absolute;bottom:16px;left:16px;display:grid;gap:9px;z-index:5;background:rgba(255,253,249,.94);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--soft-shadow)}
.legend::before{content:"知识分类";font-size:.86em;font-weight:800;color:#2f3a4a;margin-bottom:2px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.78em;color:var(--text-dim);border:0;background:transparent;text-align:left;cursor:pointer;padding:3px 4px;border-radius:8px}
.legend-item:hover,.legend-item.active{background:#fff8e8;color:#1f2937;font-weight:800}
.legend-dot{width:10px;height:10px;border-radius:50%}
.info-bar{position:absolute;bottom:16px;right:16px;font-size:.78em;color:var(--text-dim);z-index:5;background:rgba(255,253,249,.94);border:1px solid var(--border);border-radius:18px;padding:8px 14px;box-shadow:var(--soft-shadow)}
.graph-hint{position:absolute;top:16px;left:16px;z-index:6;border:1px solid var(--border);background:rgba(255,253,249,.92);border-radius:18px;padding:7px 12px;color:var(--text-dim);font-size:.78em;box-shadow:var(--soft-shadow)}
.spotlight{position:absolute;top:56px;left:16px;z-index:6;display:flex;gap:8px;flex-wrap:wrap;max-width:690px}
.spotlight button{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:16px;border:1px solid var(--border);background:rgba(255,253,249,.92);color:#2f3a4a;font-weight:700;font-size:.76em;cursor:pointer;box-shadow:0 1px 6px rgba(31,41,55,.06)}
.spotlight button:hover{border-color:var(--accent);background:#fff8e8;transform:translateY(-1px)}
.zoom-controls{position:absolute;right:16px;top:16px;z-index:6;display:grid;gap:10px}
.zoom-controls button{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--accent);font-size:1.2em;font-weight:800;cursor:pointer;box-shadow:var(--soft-shadow)}
.zoom-controls button:hover{background:#fff8e8;transform:translateY(-1px)}
.node-g{cursor:pointer;transition:opacity .18s}
.node-g.dimmed{opacity:.12}
.node-g.filtered{opacity:.08}
.node-g.selected .node-ring{stroke:var(--accent);stroke-width:3;fill:rgba(245,164,0,.10)}
.node-g.related-focus .node-ring{stroke:rgba(245,164,0,.85);stroke-width:2}
.node-core{filter:drop-shadow(0 7px 10px rgba(31,41,55,.2))}
.node-ring{fill:none;stroke:rgba(31,41,55,.16);stroke-width:1.4}
.node-icon{font-size:13px;text-anchor:middle;dominant-baseline:central;pointer-events:none}
@media (max-width:720px){
  header{display:grid;grid-template-columns:42px minmax(0,1fr);align-items:start;gap:7px 10px;padding:9px 14px 8px}
  #app,header,.filter-panel,#graph{width:100%;max-width:100vw;overflow-x:hidden}
  .brand{grid-column:1 / -1;display:grid;grid-template-columns:42px minmax(0,1fr);gap:10px;min-width:0;width:100%}
  .brand-icon{width:42px;height:42px;border-radius:13px;font-size:21px}
  header h1{font-size:1.04em;line-height:1.22;white-space:normal}
  .tagline{font-size:.75em;line-height:1.35;white-space:normal;margin-top:1px}
  .stats{grid-column:2;width:100%;justify-content:flex-start;gap:4px;font-size:.76em;line-height:1.2;white-space:normal;margin-top:-3px}
  .stats strong{font-size:1em;margin-left:6px}
  .stats strong:first-child{margin-left:0}
  .filter-panel{padding:10px 14px 9px}
  .filter-title{font-size:.92em;margin-bottom:8px}
  .filter-title span{font-size:1.12em}
  .filter-grid{gap:9px}
  .filter-block{grid-template-columns:minmax(0,1fr);gap:6px;min-width:0}
  .filter-block label{font-size:.78em}
  .filter-block label::after{left:48px;right:0}
  .filters,.semester-toggle{width:100%;min-width:0;max-width:100%;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar,.semester-toggle::-webkit-scrollbar{display:none}
  .filters button,.semester-toggle button{flex:0 0 auto;padding:7px 12px;border-radius:15px;font-size:.82em}
  .graph-hint{left:12px;right:68px;top:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.73em;padding:6px 10px}
  .spotlight{top:50px;left:12px;right:68px;max-width:none;max-height:none;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .spotlight::-webkit-scrollbar{display:none}
  .spotlight button{flex:0 0 auto;padding:7px 10px;font-size:.74em}
  .zoom-controls{right:12px;top:12px;gap:8px}
  .zoom-controls button{width:40px;height:40px;font-size:1.08em}
  .info-bar{left:12px;right:12px;bottom:12px;max-width:none;text-align:center;font-size:.72em;padding:7px 11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #graph.detail-open .spotlight{display:none}
  #graph.detail-open .graph-hint{display:none}
  .legend{display:none}
  .detail-panel{position:fixed;left:0;right:auto;top:auto;bottom:0;width:100vw;max-width:100vw;max-height:none;height:min(88dvh,760px);border-radius:20px 20px 0 0;transform:translateY(100%);z-index:30}
  .detail-panel.open{transform:translateY(0)}
  .detail-panel .detail-header{width:100%;min-width:0;overflow-x:hidden;padding:16px 18px 12px}
  .detail-panel .detail-header::before{content:"";display:block;width:42px;height:4px;border-radius:999px;background:#d7dce2;margin:0 auto 12px}
  .detail-panel .detail-scroll{width:100%;min-width:0;overflow-x:hidden;padding:0 18px max(22px,env(safe-area-inset-bottom))}
  .detail-panel .detail-title{grid-template-columns:minmax(0,1fr) 32px}
  .detail-panel h2{overflow-wrap:anywhere}
  .detail-panel .lesson-link{align-items:flex-start;flex-direction:column;padding:13px 16px}
  .detail-panel .lesson-link span{align-self:flex-end}
  .detail-panel .detail-title,.detail-panel .lesson-link,.detail-panel .visual-hero,.detail-panel .visual-fallback,.detail-panel .core-line,.detail-panel .focus-summary,.detail-panel .mentor-row,.detail-panel .section{width:calc(100vw - 36px);min-width:0;max-width:calc(100vw - 36px)}
  .detail-panel .visual-hero{display:block;max-height:210px}
  .detail-panel .mentor{min-width:0}
  .detail-panel .focus-summary{grid-template-columns:repeat(2,minmax(0,1fr))}
  #card{padding:18px}
  #card .mentor-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="brand">
    <div class="brand-icon">📖</div>
    <div>
      <h1>五年级数学知识图谱 ✨</h1>
      <div class="tagline">探索概念间的联系，点击节点查看详情</div>
    </div>
  </div>
  <div class="stats">
    <strong id="total-nodes">40</strong><span>个概念</span>
    <strong id="total-edges">57</strong><span>条关系</span>
  </div>
</header>
<section class="filter-panel">
  <div class="filter-title"><span>🔍</span>筛选知识</div>
  <div class="filter-grid">
    <div class="filter-block">
      <label>按类别</label>
  <div class="filters" id="category-filters">
    <button class="active" data-cat="all">全部</button>
    <button data-cat="number_ops">数与运算</button>
    <button data-cat="geometry">几何</button>
    <button data-cat="algebra">代数</button>
    <button data-cat="statistics">统计</button>
    <button data-cat="applications">应用</button>
  </div>
    </div>
    <div class="filter-block">
      <label>按学期</label>
  <div class="semester-toggle" id="semester-toggle">
    <button class="active" data-sem="all">全学年</button>
    <button data-sem="0">基础</button>
    <button data-sem="1">上册</button>
    <button data-sem="2">下册</button>
  </div>
    </div>
  </div>
</section>
<div id="graph">
  <div class="legend" id="legend"></div>
  <div class="graph-hint">↔ 拖拽节点 · 滚轮缩放 · 点击查看详情</div>
  <div class="spotlight" id="spotlight"></div>
  <div class="zoom-controls">
    <button id="zoom-in" aria-label="放大">+</button>
    <button id="zoom-out" aria-label="缩小">−</button>
    <button id="zoom-reset" aria-label="重置视图">↺</button>
  </div>
  <div class="info-bar" id="info-bar"></div>
  <div class="detail-panel" id="detail-panel"></div>
</div>
<div id="tooltip"></div>
</div>
<div id="card-overlay"><div id="card"></div></div>

const CONCEPT_LIBRARY = window.MathGrade5Concepts || {};
Object.assign(EXPERIENCE_IMAGES, CONCEPT_LIBRARY.images || {});
Object.assign(COURSEWARE_LINKS, CONCEPT_LIBRARY.lessons || {});
Object.assign(VISUAL_METAPHORS, CONCEPT_LIBRARY.visuals || {});
function visualFor(node){
  const shared = CONCEPT_LIBRARY.get?.(node.name);
  if(shared)return {icon:shared.icon,metaphor:shared.metaphor,label:shared.label,image:shared.image};
  const meta = VISUAL_METAPHORS[node.name] || ['✨','把抽象概念变成一个可观察的数学物件','可视化模型'];
  return {icon:meta[0],metaphor:meta[1],label:meta[2],image:EXPERIENCE_IMAGES[node.name]};
}

// Node map for quick lookup
const nodeMap = Object.fromEntries(nodes.map(n=>[n.id,n]));
const graphEdges = edges.map(e=>({...e,source:e.from,target:e.to}));
let activeCat = 'all', activeSem = 'all', selectedNodeId = null;

const relationMap = new Map(nodes.map(n=>[n.id,new Set([n.id])]));
edges.forEach(e=>{
  relationMap.get(e.from)?.add(e.to);
  relationMap.get(e.to)?.add(e.from);
});

function passesSemester(d){
  if(activeSem==='all')return true;
  if(activeSem==='0')return d.semester===0;
  return d.semester===0 || d.semester===parseInt(activeSem);
}
function passesNodeFilter(d){
  return (activeCat==='all'||d.category===activeCat) && passesSemester(d);
}
function passesEdgeFilter(e){
  return passesNodeFilter(nodeMap[e.from]) && passesNodeFilter(nodeMap[e.to]);
}
function edgeTouches(e,id){
  return e.from===id || e.to===id;
}
function rankScores(rows){
  const sorted = [...rows].sort((a,b)=>b.score-a.score || a.name.localeCompare(b.name,'zh-CN'));
  return Object.fromEntries(sorted.map((row,index)=>[row.id,index+1]));
}
const directDegree = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>edgeTouches(e,n.id)).length
]));
const prerequisiteCount = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>e.to===n.id).length
]));
const successorCount = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>e.from===n.id).length
]));
const degreeRank = rankScores(nodes.map(n=>({id:n.id,name:n.name,score:directDegree[n.id]||0})));
const misconceptionRiskScore = Object.fromEntries(nodes.map(n=>{
  const prereq = prerequisiteCount[n.id] || 0;
  const next = successorCount[n.id] || 0;
  const bridge = Math.min(directDegree[n.id] || 0,4) * 0.35;
  return [n.id,Number((n.difficulty*2 + prereq*1.15 + next*1.25 + bridge).toFixed(2))];
}));
const riskRank = rankScores(nodes.map(n=>({id:n.id,name:n.name,score:misconceptionRiskScore[n.id]})));
function lessonPriorityFor(d){
  const degree = degreeRank[d.id] || nodes.length;
  const risk = riskRank[d.id] || nodes.length;
  const best = Math.min(degree,risk);
  if(best <= 10)return {label:'高',key:'high'};
  if(best <= 22)return {label:'中',key:'mid'};
  return {label:'低',key:'low'};
}
function lessonPlanFor(d){
  const priority = lessonPriorityFor(d);
  return {
    priority,
    degreeRank:degreeRank[d.id] || nodes.length,
    riskRank:riskRank[d.id] || nodes.length,
    riskScore:misconceptionRiskScore[d.id] || 0
  };
}

// 黑塞式层级布局：按前置依赖计算层级深度
const _prereqEdges = edges.filter(e=>e.type==='prerequisite_of');
const _inDeg = new Map, _outDeg = new Map;
nodes.forEach(n=>{_inDeg.set(n.id,new Set);_outDeg.set(n.id,new Set);});
_prereqEdges.forEach(e=>{_inDeg.get(e.to).add(e.from);_outDeg.get(e.from).add(e.to);});
const _depthMap = new Map, _q = nodes.filter(n=>!_inDeg.get(n.id).size);
_q.forEach(n=>_depthMap.set(n.id,0));
for(let _i=0;_i<_q.length;_i++){
  const d = _depthMap.get(_q[_i].id);
  for(const s of _outDeg.get(_q[_i].id)){
    if(!_depthMap.has(s)||_depthMap.get(s)<d+1){_depthMap.set(s,d+1);_q.push(nodes.find(n=>n.id===s));}
  }
}
nodes.forEach(n=>{if(!_depthMap.has(n.id))_depthMap.set(n.id,0);});
const _maxDepth = Math.max(..._depthMap.values());

// 黑塞式力导向：纵向按深度分层，横向在同层内按类别散开
const _layerH = H / (_maxDepth + 2);
const simulation = d3.forceSimulation(nodes)
  .force('link',d3.forceLink(graphEdges).id(d=>d.id).distance(d=>d.type==='related_to'?72:82).strength(0.35))
  .force('charge',d3.forceManyBody().strength(d=>-100-d.difficulty*15))
  .force('y',d3.forceY(d=>(_depthMap.get(d.id)+1)*_layerH).strength(0.22))
  .force('x',d3.forceX(d=>{
    const same = nodes.filter(n=>_depthMap.get(n.id)===_depthMap.get(d.id)&&n.category===d.category);
    const idx = same.indexOf(d);
    return same.length>1?(W/(same.length+1))*(idx+1):W/2;
  }).strength(0.06))
  .force('collision',d3.forceCollide().radius(d=>18+d.difficulty*2))
  .alphaDecay(0.025);
simulation.stop();
for(let i=0;i<300;i++)simulation.tick();

function showCard(d){
  const cat = CAT_NAMES[d.category];

  const visual = visualFor(d);
  const lesson = COURSEWARE_LINKS[d.name];
  const prereqs = edges.filter(e=>e.to===d.id).map(e=>({name:nodeMap[e.from].name,exp:e.exp,cat:nodeMap[e.from].category}));
  const nexts = edges.filter(e=>e.from===d.id).map(e=>({name:nodeMap[e.to].name,exp:e.exp,cat:nodeMap[e.to].category}));
  const relationEdges = edges.filter(e=>edgeTouches(e,d.id));
  const relatedConcepts = [...new Set(relationEdges.map(e=>e.from===d.id?e.to:e.from))].map(id=>nodeMap[id]);

  let header = `<div class="detail-title"><div><h2>${visual.icon} ${d.name}</h2><span class="badge" style="background:${color}">${cat} · ${sem} · ${visual.label}</span></div><button class="close-btn" onclick="closeCard()" aria-label="关闭详情">✕</button></div>`;

  }else{
    html += `<div class="visual-fallback"><div class="visual-symbol" style="color:${color}">${visual.icon}</div><div class="visual-copy"><strong>${visual.label}</strong><span>${visual.metaphor}</span></div></div>`;

  html += `<p class="core-line"><strong>视觉模型：</strong>${visual.metaphor}</p>`;
  if(!lesson){
    const plan = lessonPlanFor(d);
    html += `<div class="lesson-note">

      <div class="priority-row"><span class="priority-pill ${plan.priority.key}">${plan.priority.label}优先级</span><span>连接度排名 第 ${plan.degreeRank}/${nodes.length}</span></div>
      <div>误区风险排名 第 ${plan.riskRank}/${nodes.length} · 风险评分 ${plan.riskScore}</div>
      <small>误区风险由概念难度、前置依赖、后继概念和图谱连接度推算；接入真实错因数据后再替换为频率排名。</small>
    </div>`;
  }
  html += `<div class="focus-summary">
    <div class="focus-stat"><strong>${relatedConcepts.length}</strong>个相关概念</div>
    <div class="focus-stat"><strong>${relationEdges.length}</strong>条直接关系</div>
  </div>`;
  html += `<p class="core-line">难度：${'⭐'.repeat(d.difficulty)}</p>`;
  html += `<div class="mentor-row">
    <div class="mentor"><img src="assets/portraits/einstein-avatar.webp" alt=""><div><b>对抗式思考</b><span>这句话少了什么条件？能不能举反例？</span></div></div>
    <div class="mentor"><img src="assets/portraits/feynman-avatar.webp" alt=""><div><b>费曼输出</b><span>用一句话讲给低年级同学听。</span></div></div>
  </div>`;

  const relationButton = (other,arrow,exp)=>`<button class="relation-item" type="button" onclick="focusNodeById('${other.id}')"><span class="relation-name" style="color:${CAT_COLORS[other.category]}">${arrow} ${other.name}</span><span class="relation-exp">${exp}</span></button>`;

  if(relationEdges.length>0){
    html += `<div class="section"><h4>高亮关系 (${relationEdges.length})</h4>`;
    relationEdges.slice(0,6).forEach(e=>{
      const isOut = e.from===d.id;

      const arrow = isOut ? '→' : '←';

    html += `</div>`;

function applyGraphState(){
  const focusIds = selectedNodeId ? relationMap.get(selectedNodeId) : null;
  node.attr('class',d=>{
    const visible = passesNodeFilter(d);
    const selected = d.id===selectedNodeId;
    const related = !!focusIds?.has(d.id) && !selected;
    const dimmed = selectedNodeId && !focusIds.has(d.id);
    return ['node-g',selected?'selected':'',related?'related-focus':'',dimmed?'dimmed':'',!visible?'filtered':''].filter(Boolean).join(' ');
  }).style('opacity',d=>{
    const visible = passesNodeFilter(d);
    if(selectedNodeId){
      if(d.id===selectedNodeId)return 1;
      if(focusIds.has(d.id))return visible?0.98:0.45;
      return visible?0.12:0.05;
    }
    return visible?1:0.08;
  });

  link.attr('class',d=>{
    const base = ['edge',d.type==='related_to'?'related':''];
    if(selectedNodeId){
      base.push(edgeTouches(d,selectedNodeId)?'highlighted':'dimmed');
    }
    if(!passesEdgeFilter(d))base.push('filtered');
    return base.filter(Boolean).join(' ');
  }).style('opacity',d=>{
    const visible = passesEdgeFilter(d);
    if(selectedNodeId){
      if(edgeTouches(d,selectedNodeId))return visible?1:0.35;
      return visible?0.07:0.03;
    }
    return visible?1:0.04;
  });
  updateInfo();
}

function updateInfo(){
  const visibleNodes = nodes.filter(n=>{
    const cm = activeCat==='all'||n.category===activeCat;
    return passesNodeFilter(n);
  }).length;
  const visibleEdges = edges.filter(e=>{
    return passesEdgeFilter(e);
  }).length;
  if(selectedNodeId){
    const selected = nodeMap[selectedNodeId];
    const relationCount = edges.filter(e=>edgeTouches(e,selectedNodeId)).length;
    const relatedCount = Math.max((relationMap.get(selectedNodeId)?.size||1)-1,0);
    document.getElementById('info-bar').textContent = `已聚焦：${selected.name} · ${relatedCount} 个相关概念 · ${relationCount} 条关系`;
  }else{
    document.getElementById('info-bar').textContent = `${visibleNodes} 个概念 · ${visibleEdges} 条依赖`;
  }
}

function fitGraph(duration=800){
  const bounds = g.node().getBBox();
  if(!bounds.width||!bounds.height)return;
  const dx = bounds.width, dy = bounds.height, cx = bounds.x+dx/2, cy = bounds.y+dy/2;
  const w = container.clientWidth || W;
  const h = container.clientHeight || H;
  const compact = w < 720;
  const leftPad = compact ? 24 : 150;
  const rightPad = compact ? 24 : 92;
  const topPad = compact ? 126 : 118;
  const bottomPad = compact ? 84 : 66;
  const innerW = Math.max(260,w-leftPad-rightPad);
  const innerH = Math.max(260,h-topPad-bottomPad);
  const scale = Math.min(innerW/dx,innerH/dy,2.7)*0.94;
  const targetX = leftPad + innerW/2 - scale*cx;
  const targetY = topPad + innerH/2 - scale*cy;
  svg.transition().duration(duration).call(zoom.transform,d3.zoomIdentity.translate(targetX,targetY).scale(scale));
}

simulation.on('end',()=>fitGraph());
// Also try after a fixed timeout as fallback
setTimeout(()=>fitGraph(0),0);
setTimeout(()=>fitGraph(),3000);

d3.select('#zoom-in').on('click',()=>svg.transition().duration(240).call(zoom.scaleBy,1.22));
d3.select('#zoom-out').on('click',()=>svg.transition().duration(240).call(zoom.scaleBy,0.82));
d3.select('#zoom-reset').on('click',()=>fitGraph(500));

document.getElementById('total-nodes').textContent = nodes.length;
document.getElementById('total-edges').textContent = edges.length;
syncControls();
applyGraphState();
const initialFocusName = decodeURIComponent(location.hash.slice(1));
if(initialFocusName){
  const initialNode = nodes.find(n=>n.name===initialFocusName);
  if(initialNode)setTimeout(()=>selectNode(initialNode),120);
}

// Resize
window.addEventListener('resize',()=>{
  const w=container.clientWidth, h=container.clientHeight;
  svg.attr('width',w).attr('height',h);
  const _ly = h / (_maxDepth+2);
  simulation.force('y',d3.forceY(d=>(_depthMap.get(d.id)+1)*_ly).strength(0.22))
    .force('x',d3.forceX(d=>{
      const same=nodes.filter(n=>_depthMap.get(n.id)===_depthMap.get(d.id)&&n.category===d.category);
      const idx=same.indexOf(d);
      return same.length>1?(w/(same.length+1))*(idx+1):w/2;
    }).strength(0.06)).restart();
});
</script>
</body>
