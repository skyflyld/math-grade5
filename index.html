<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五年级数学 · 概念星图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="shared/concepts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --number-ops:#4A90D9;--geometry:#E85D75;--algebra:#7B68EE;
  --statistics:#F0A050;--applications:#50B87A;
  --bg:#f7f9fb;--surface:#fffdf9;--text:#1f2937;--text-dim:#667085;
  --card-bg:#fffdf9;--border:#eadfce;--accent:#f5a400;--green:#45c77a;
  --shadow:0 12px 34px rgba(31,41,55,.12);--soft-shadow:0 8px 24px rgba(70,80,96,.10);
  --font-cn:"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",var(--font-cn);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;letter-spacing:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{display:flex;flex-direction:column;height:100dvh;min-height:0}
header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:9px 28px;background:var(--surface);border-bottom:1px solid var(--border);z-index:12;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;min-width:280px}
.brand-icon{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#f2df4b,#62d184);box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);font-size:23px}
header h1{font-size:1.18em;font-weight:760;white-space:nowrap;letter-spacing:0}
.tagline{font-size:.82em;color:var(--text-dim);margin-top:2px;white-space:nowrap}
.stats{display:flex;align-items:baseline;gap:6px;color:var(--text-dim);font-size:.86em;white-space:nowrap}
.stats strong{font-size:1.05em;color:#1f2937;margin-left:10px}
.filter-panel{padding:11px 28px 10px;background:rgba(255,253,249,.96);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(31,41,55,.04);z-index:11;flex-shrink:0}
.filter-title{display:flex;align-items:center;gap:8px;font-weight:760;margin-bottom:10px}
.filter-title span{font-size:1.2em}
.filter-title button{margin-left:auto;display:none;min-height:32px;border:1px solid var(--border);border-radius:14px;background:#fff;color:#2f3a4a;font:inherit;font-size:.78em;font-weight:800;padding:0 11px;cursor:pointer}
.filter-title button:hover{border-color:var(--accent);background:#fff8e8}
.filter-grid{display:grid;gap:10px}
.filter-block{display:grid;grid-template-columns:56px 1fr;align-items:center;gap:10px}
.filter-block label,.search-block label{font-size:.82em;font-weight:700;color:var(--text-dim);position:relative}
.filter-block label::after,.search-block label::after{content:"";position:absolute;left:52px;right:-8px;top:50%;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.search-block{display:grid;grid-template-columns:56px minmax(0,1fr);align-items:start;gap:10px}
.search-box{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
.search-box input{width:100%;min-height:38px;border:1px solid var(--border);border-radius:16px;background:#fff;padding:8px 14px;font:inherit;font-size:.86em;font-weight:700;color:var(--text);box-shadow:0 1px 4px rgba(31,41,55,.04)}
.search-box input:focus{outline:2px solid rgba(245,164,0,.28);border-color:var(--accent)}
.search-box button{min-height:38px;border:1px solid var(--border);border-radius:15px;background:#fff;color:var(--text-dim);font-weight:800;padding:0 13px;cursor:pointer}
.search-box button:hover{border-color:var(--accent);color:#9a6400;background:#fff8e8}
.search-results{grid-column:2;display:none;gap:8px;flex-wrap:wrap;margin-top:-4px}
.search-results.open{display:flex}
.search-results button{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:16px;background:#fff;color:#2f3a4a;padding:6px 10px;font-size:.76em;font-weight:800;cursor:pointer;box-shadow:0 1px 4px rgba(31,41,55,.04)}
.search-results button:hover{border-color:var(--accent);background:#fff8e8}
.search-results .empty{font-size:.78em;color:var(--text-dim);padding:6px 2px}
.filters,.semester-toggle{display:flex;gap:8px;flex-wrap:wrap}
.filters button,.semester-toggle button{display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:17px;background:#fff;color:#2f3a4a;cursor:pointer;font-size:.86em;font-weight:700;transition:all .18s;white-space:nowrap;box-shadow:0 1px 4px rgba(31,41,55,.04)}
.filters button::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--chip-color,#9aa6b2)}
.filters button[data-cat="all"]::before{display:none}
.filters button[data-cat="number_ops"]{--chip-color:var(--number-ops)}
.filters button[data-cat="geometry"]{--chip-color:var(--geometry)}
.filters button[data-cat="algebra"]{--chip-color:var(--algebra)}
.filters button[data-cat="statistics"]{--chip-color:var(--statistics)}
.filters button[data-cat="applications"]{--chip-color:var(--applications)}
.filters button:hover,.semester-toggle button:hover{transform:translateY(-1px);border-color:#d6c8b2;box-shadow:var(--soft-shadow)}
.filters button.active{background:#8e8e8e;color:#fff;border-color:#8e8e8e}
.semester-toggle button.active{background:var(--green);color:#fff;border-color:var(--green)}
#graph{flex:1;position:relative;cursor:grab;min-height:0;background:radial-gradient(circle at 52% 48%,#ffffff 0,#f8fbfc 46%,#f2f6f7 100%);overflow:hidden}
#graph::before{content:"";position:absolute;inset:0;background:url("assets/concepts/knowledge-atlas.webp") center/cover no-repeat;opacity:.055;mix-blend-mode:multiply;pointer-events:none;z-index:0}
#graph:active{cursor:grabbing}
#graph svg{width:100%;height:100%;display:block;position:relative;z-index:1}
.node-label{font-size:11.5px;fill:#2f3a4a;pointer-events:none;text-anchor:middle;font-weight:850;paint-order:stroke;stroke:#fff;stroke-width:4px;stroke-linejoin:round}
line.edge{stroke:#8191a6;stroke-width:1.5;stroke-opacity:.68}
line.edge.related{stroke-dasharray:5 4;stroke-opacity:.55}
line.edge.highlighted{stroke:var(--accent);stroke-width:3;stroke-opacity:1}
line.edge.dimmed{stroke-opacity:.08}
line.edge.hovered{stroke:var(--accent);stroke-width:3;stroke-opacity:1}
#tooltip{position:absolute;padding:12px 16px;background:#fff;border:1px solid var(--border);border-radius:14px;font-size:.82em;max-width:320px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;line-height:1.6;box-shadow:var(--shadow-md)}
#tooltip .tt-cat{font-size:.72em;color:var(--text-dim);letter-spacing:.04em;font-weight:700}
#tooltip .tt-meta{font-size:.72em;color:var(--text-muted);margin-top:2px}
#tooltip .tt-stars{color:#f59e0b;letter-spacing:.5px}
#tooltip .tt-desc{margin-top:4px;color:var(--text-muted);font-size:.92em;line-height:1.5}
#tooltip .tt-edge{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--accent);font-size:.78em}
#card-overlay{display:none}
#card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;width:min(92vw,520px);max-height:calc(100dvh - 36px);overflow-y:auto;box-shadow:var(--shadow)}
#card h2{font-size:1.28em;margin-bottom:4px}
#card .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72em;color:#fff;margin-bottom:12px}
#card .visual-hero{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin:12px 0;border:1px solid var(--border);background:#f2f6f7}
#card .visual-fallback{display:grid;grid-template-columns:84px 1fr;gap:14px;align-items:center;min-height:130px;margin:12px 0;padding:16px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(135deg,#fff7df,#f4fbff)}
#card .visual-symbol{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:#fff;box-shadow:inset 0 0 0 1px rgba(31,41,55,.08)}
#card .visual-copy strong{display:block;margin-bottom:4px}
#card .visual-copy span{display:block;color:var(--text-dim);font-size:.83em;line-height:1.55}
#card .mentor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
#card .mentor{display:grid;grid-template-columns:36px 1fr;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff}
#card .mentor img{width:36px;height:36px;border-radius:50%;object-fit:cover}
#card .mentor b{display:block;font-size:.78em}
#card .mentor span{display:block;color:var(--text-dim);font-size:.72em;line-height:1.35}
#card .section{margin-top:14px}
#card .section h4{font-size:.8em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
#card .section .item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85em}
#card .section .item .arrow{color:var(--accent);margin:0 4px}
#card .section .item .exp{display:block;font-size:.78em;color:var(--text-dim);margin-top:2px}
#card .close-btn{float:right;background:none;border:none;color:var(--text-dim);font-size:1.3em;cursor:pointer;padding:0 4px}
#card .close-btn:hover{color:var(--text)}
.detail-panel{position:absolute;top:16px;right:72px;z-index:7;width:min(430px,calc(100% - 190px));max-height:calc(100% - 32px);overflow:hidden;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translateX(14px);transition:opacity .18s,transform .18s;display:flex;flex-direction:column}
.detail-panel.open{opacity:1;pointer-events:auto;transform:translateX(0)}
.detail-panel .detail-header{position:sticky;top:0;z-index:2;padding:16px 18px 12px;background:var(--card-bg);border-bottom:1px solid rgba(234,223,206,.72)}
.detail-panel .detail-scroll{overflow-y:auto;overflow-x:hidden;padding:0 18px 18px}
.detail-panel .detail-title{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.detail-panel .close-btn{background:none;border:none;color:var(--text-dim);font-size:1.25em;cursor:pointer;padding:0 4px;line-height:1}
.detail-panel .close-btn:hover{color:var(--text)}
.detail-panel h2{font-size:1.1em;margin-bottom:5px}
.detail-panel .badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72em;color:#fff;margin-bottom:10px}
.detail-panel .visual-hero{width:100%;max-width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin:10px 0;border:1px solid var(--border);background:#f2f6f7}
.detail-panel .visual-caption{margin:-2px 0 8px;color:var(--text-dim);font-size:.74em;line-height:1.45}
.detail-panel .core-line{margin-top:8px;color:var(--text-dim);font-size:.86em;line-height:1.55;overflow-wrap:anywhere}
.detail-panel .lesson-link{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0 4px;padding:11px 14px;border-radius:12px;background:linear-gradient(135deg,#f5a400,#fb923c);color:#fff;text-decoration:none;font-weight:800;font-size:.86em;box-shadow:0 8px 18px rgba(245,164,0,.22);max-width:100%}
.detail-panel .lesson-link:hover{filter:brightness(1.03);transform:translateY(-1px)}
.detail-panel .lesson-link span{font-size:.76em;font-weight:700;opacity:.9}
.detail-panel .lesson-note{margin-top:8px;padding:8px 10px;border-radius:10px;background:#fff8e8;color:#8a5a00;font-size:.76em;line-height:1.45}
.detail-panel .lesson-note b{display:block;margin-bottom:5px;color:#704300}
.detail-panel .lesson-note .priority-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
.detail-panel .priority-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#fff;color:#8a5a00;border:1px solid rgba(245,164,0,.35);font-weight:800}
.detail-panel .priority-pill.high{background:#fef3c7;color:#92400e}
.detail-panel .priority-pill.mid{background:#e0f2fe;color:#075985}
.detail-panel .priority-pill.low{background:#f1f5f9;color:#475569}
.detail-panel .lesson-note small{display:block;margin-top:4px;color:#9a6a12;line-height:1.45}
.detail-panel .path-card{margin-top:10px;padding:10px;border:1px solid rgba(245,164,0,.35);border-radius:12px;background:linear-gradient(145deg,#fff8e8,#fff)}
.detail-panel .path-card b{display:block;color:#8a5a00;font-size:.78em;margin-bottom:6px}
.detail-panel .path-list{display:grid;gap:6px}
.detail-panel .path-list button{width:100%;border:1px solid rgba(234,223,206,.88);border-radius:10px;background:#fff;text-align:left;padding:7px 9px;color:#2f3a4a;font:inherit;font-size:.8em;font-weight:800;cursor:pointer}
.detail-panel .path-list button span{display:block;margin-top:2px;color:var(--text-dim);font-size:.9em;font-weight:600;line-height:1.4}
.detail-panel .path-list button:hover{border-color:var(--accent);background:#fffaf0}
.detail-panel .focus-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0}
.detail-panel .focus-stat{min-width:0;padding:8px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:.78em}
.detail-panel .focus-stat strong{display:block;font-size:1.2em;color:#1f2937}
.detail-panel .mentor-row{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.detail-panel .mentor{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:center;padding:9px;border:1px solid var(--border);border-radius:11px;background:#fff}
.detail-panel .mentor img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.detail-panel .mentor b{display:block;font-size:.76em}
.detail-panel .mentor span{display:block;color:var(--text-dim);font-size:.72em;line-height:1.35}
.detail-panel .section{margin-top:12px}
.detail-panel .section h4{font-size:.76em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.detail-panel .section .item{padding:6px 0;border-top:1px solid rgba(31,41,55,.07);font-size:.82em}
.detail-panel .section .exp{display:block;color:var(--text-dim);font-size:.78em;line-height:1.45;margin-top:2px}
.detail-panel .relation-item{width:100%;border:0;border-top:1px solid rgba(31,41,55,.07);background:transparent;text-align:left;padding:8px 0;cursor:pointer;font:inherit;color:inherit}
.detail-panel .relation-item:first-of-type{border-top:0}
.detail-panel .relation-item:hover .relation-name{color:var(--accent)}
.detail-panel .relation-name{display:inline-flex;align-items:center;gap:4px;font-weight:800;transition:color .16s}
.detail-panel .relation-name::after{content:"›";color:var(--accent);font-weight:900}
.detail-panel .relation-exp{display:block;color:var(--text-dim);font-size:.78em;line-height:1.45;margin-top:2px}
.detail-overlay{display:none}
.legend{position:absolute;bottom:16px;left:16px;display:grid;gap:9px;z-index:5;background:rgba(255,253,249,.94);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--soft-shadow)}
.legend::before{content:"知识分类";font-size:.86em;font-weight:800;color:#2f3a4a;margin-bottom:2px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.78em;color:var(--text-dim);border:0;background:transparent;text-align:left;cursor:pointer;padding:3px 4px;border-radius:8px}
.legend-item:hover,.legend-item.active{background:#fff8e8;color:#1f2937;font-weight:800}
.legend-dot{width:10px;height:10px;border-radius:50%}
.info-bar{position:absolute;bottom:16px;right:16px;font-size:.78em;color:var(--text-dim);z-index:5;background:rgba(255,253,249,.94);border:1px solid var(--border);border-radius:18px;padding:8px 14px;box-shadow:var(--soft-shadow)}
.path-panel{position:absolute;right:16px;bottom:62px;z-index:5;width:min(320px,calc(100% - 180px));background:rgba(255,253,249,.95);border:1px solid var(--border);border-radius:14px;box-shadow:var(--soft-shadow);padding:12px 14px}
.path-panel h3{font-size:.82em;margin-bottom:8px;color:#2f3a4a}
.path-panel .path-actions{display:grid;gap:7px}
.path-panel button{border:1px solid rgba(234,223,206,.9);border-radius:10px;background:#fff;color:#2f3a4a;text-align:left;font:inherit;font-size:.76em;font-weight:800;line-height:1.35;padding:8px 9px;cursor:pointer}
.path-panel button span{display:block;color:var(--text-dim);font-size:.9em;font-weight:600;margin-top:2px}
.path-panel button:hover{border-color:var(--accent);background:#fff8e8}
.graph-hint{position:absolute;top:16px;left:16px;z-index:6;border:1px solid var(--border);background:rgba(255,253,249,.92);border-radius:18px;padding:7px 12px;color:var(--text-dim);font-size:.78em;box-shadow:var(--soft-shadow)}
.spotlight{position:absolute;top:50px;left:16px;z-index:6;display:flex;gap:8px;flex-wrap:wrap;max-width:730px}
.spotlight button{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:16px;border:1px solid var(--border);background:rgba(255,253,249,.92);color:#2f3a4a;font-weight:700;font-size:.76em;cursor:pointer;box-shadow:0 1px 6px rgba(31,41,55,.06)}
.spotlight button:hover{border-color:var(--accent);background:#fff8e8;transform:translateY(-1px)}
.zoom-controls{position:absolute;right:16px;top:16px;z-index:6;display:grid;gap:10px}
.zoom-controls button{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--accent);font-size:1.2em;font-weight:800;cursor:pointer;box-shadow:var(--soft-shadow)}
.zoom-controls button:hover{background:#fff8e8;transform:translateY(-1px)}
.node-g{cursor:pointer;transition:opacity .18s}
.node-g.dimmed{opacity:.12}
.node-g.filtered{opacity:.08}
.node-g.selected .node-ring{stroke:var(--accent);stroke-width:3;fill:rgba(245,164,0,.10)}
.node-g.related-focus .node-ring{stroke:rgba(245,164,0,.85);stroke-width:2}
.node-core{filter:drop-shadow(0 7px 10px rgba(31,41,55,.2))}
.node-ring{fill:none;stroke:rgba(31,41,55,.16);stroke-width:1.4}
.node-icon{font-size:13px;text-anchor:middle;dominant-baseline:central;pointer-events:none}
@media (max-width:720px){
  header{display:grid;grid-template-columns:42px minmax(0,1fr);align-items:start;gap:6px 10px;padding:8px 14px 7px}
  #app,header,.filter-panel,#graph{width:100%;max-width:100vw;overflow-x:hidden}
  .brand{grid-column:1 / -1;display:grid;grid-template-columns:42px minmax(0,1fr);gap:10px;min-width:0;width:100%}
  .brand-icon{width:42px;height:42px;border-radius:13px;font-size:21px}
  header h1{font-size:1.04em;line-height:1.22;white-space:normal}
  .tagline{font-size:.75em;line-height:1.35;white-space:normal;margin-top:1px}
  .stats{grid-column:2;width:100%;justify-content:flex-start;gap:4px;font-size:.76em;line-height:1.2;white-space:normal;margin-top:-3px}
  .stats strong{font-size:1em;margin-left:6px}
  .stats strong:first-child{margin-left:0}
  .filter-panel{padding:8px 14px}
  .filter-title{font-size:.92em;margin-bottom:0;position:relative;padding-right:64px}
  .filter-title button{display:inline-flex;align-items:center;justify-content:center;position:absolute;right:0;top:-5px;min-width:54px;box-shadow:0 2px 8px rgba(31,41,55,.08)}
  .filter-panel.expanded .filter-title{margin-bottom:8px}
  .filter-panel:not(.expanded) .filter-grid{display:none}
  .filter-title span{font-size:1.12em}
  .filter-grid{gap:9px}
  .filter-block,.search-block{grid-template-columns:minmax(0,1fr);gap:6px;min-width:0}
  .filter-block label,.search-block label{font-size:.78em}
  .filter-block label::after,.search-block label::after{left:48px;right:0}
  .search-box{grid-template-columns:minmax(0,1fr) auto}
  .search-box input{min-height:36px;font-size:.82em;border-radius:15px}
  .search-box button{min-height:36px;padding:0 11px;font-size:.8em}
  .search-results{grid-column:1;display:none;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .search-results::-webkit-scrollbar{display:none}
  .search-results.open{display:flex}
  .search-results button{flex:0 0 auto}
  .filters,.semester-toggle{width:100%;min-width:0;max-width:100%;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar,.semester-toggle::-webkit-scrollbar{display:none}
  .filters button,.semester-toggle button{flex:0 0 auto;padding:7px 12px;border-radius:15px;font-size:.82em}
  .graph-hint{left:12px;right:68px;top:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.73em;padding:6px 10px}
  .spotlight{top:46px;left:12px;right:68px;max-width:none;max-height:none;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .spotlight::-webkit-scrollbar{display:none}
  .spotlight button{flex:0 0 auto;padding:7px 10px;font-size:.74em}
  .zoom-controls{right:12px;top:12px;gap:8px}
  .zoom-controls button{width:40px;height:40px;font-size:1.08em}

.diag-reset{background:none;border:none;color:var(--text-dim);font-size:.72em;cursor:pointer;padding:6px 22px 14px;text-decoration:underline;opacity:.5}

const nodes = [{"id":"e65c5d65","name":"整数加减法","category":"number_ops","desc":"自然数的加法和减法运算，包括进位和退位","difficulty":1,"semester":0},{"id":"ea935433","name":"整数乘法","category":"number_ops","desc":"乘法是加法的简便运算，理解乘法的意义","difficulty":1,"semester":0},{"id":"87a251c8","name":"整数除法","category":"number_ops","desc":"除法的两种含义：均分和包含","difficulty":2,"semester":0},{"id":"d9ed4cc5","name":"位置值","category":"number_ops","desc":"十进制计数法，每个数位代表不同的计数单位","difficulty":2,"semester":0},{"id":"ab2f17ee","name":"小数的意义","category":"number_ops","desc":"小数是十分之几、百分之几的另一种写法，是位置值向右的延伸","difficulty":2,"semester":0},{"id":"ada6e1e6","name":"整数四则运算","category":"number_ops","desc":"加减乘除的运算顺序，括号的使用","difficulty":2,"semester":0},{"id":"1449aff7","name":"矩形面积","category":"geometry","desc":"面积 = 单位正方形个数 = 长 × 宽","difficulty":2,"semester":0},{"id":"e2d70d40","name":"等式的性质","category":"algebra","desc":"等式两边同时加减乘除同一个非零数，等式仍然成立","difficulty":2,"semester":0},{"id":"d6aedde0","name":"图形认知","category":"geometry","desc":"识别基本平面图形，理解边和角","difficulty":1,"semester":0},{"id":"ca7b8697","name":"分数基础","category":"number_ops","desc":"分数表示部分与整体的关系，分子和分母的含义","difficulty":3,"semester":0},{"id":"60d47092","name":"数据收集","category":"statistics","desc":"收集、整理和简单呈现数据的方法","difficulty":1,"semester":0},{"id":"c99fc85f","name":"单位换算","category":"number_ops","desc":"长度、面积、质量、时间、体积单位之间的换算","difficulty":2,"semester":0},{"id":"3d143a12","name":"轴对称与旋转","category":"geometry","desc":"识别轴对称图形和旋转现象，能在方格纸上进行简单的图形变换","difficulty":2,"semester":2},{"id":"7b80a791","name":"小数乘法","category":"number_ops","desc":"整数乘法法则 + 处理小数点位置；理解乘小于1的数结果变小","difficulty":3,"semester":1},{"id":"972d2981","name":"小数除法","category":"number_ops","desc":"利用商不变性质转化为整数除法","difficulty":4,"semester":1},{"id":"39b823e4","name":"因数和倍数","category":"number_ops","desc":"一个数的因数和倍数，理解相互依存关系","difficulty":3,"semester":2},{"id":"e6e8bcff","name":"235的倍数特征","category":"number_ops","desc":"个位0/2/4/6/8是2的倍数；数字和是3的倍数是3的倍数","difficulty":3,"semester":2},{"id":"f5ab1e67","name":"循环小数","category":"number_ops","desc":"除不尽时小数部分不断重复的现象，循环节表示法","difficulty":4,"semester":1},{"id":"480cc030","name":"观察物体","category":"geometry","desc":"从不同方向观察立体，能辨认和画出三视图","difficulty":2,"semester":1},{"id":"7ec9ac40","name":"质数与合数","category":"number_ops","desc":"质数只有1和自身两个因数，合数有多于两个因数","difficulty":3,"semester":2},{"id":"9aeeb7d4","name":"简易方程","category":"algebra","desc":"用字母表示数，等式的基本性质，解简单的一元一次方程","difficulty":3,"semester":1},{"id":"8938c8aa","name":"长方体和正方体","category":"geometry","desc":"认识面、棱、顶点，长宽高；表面积 = 各面面积之和","difficulty":3,"semester":2},{"id":"e7839062","name":"平行四边形面积","category":"geometry","desc":"通过剪拼法转化为长方形，推导出面积 = 底 × 高","difficulty":3,"semester":1},{"id":"64f85488","name":"体积和体积单位","category":"geometry","desc":"体积 = 物体所占空间的大小；体积单位 cm³、dm³、m³","difficulty":3,"semester":2},{"id":"3e85004a","name":"长方体体积","category":"geometry","desc":"体积 = 单位立方体个数 = 长 × 宽 × 高","difficulty":3,"semester":2},{"id":"95450fcd","name":"三角形面积","category":"geometry","desc":"两个完全一样的三角形拼成平行四边形，面积 = 底 × 高 ÷ 2","difficulty":3,"semester":1},{"id":"c9e183fc","name":"容积和容积单位","category":"geometry","desc":"容积 = 容器内部空间；L 和 mL，1L = 1dm³","difficulty":3,"semester":2},{"id":"24ea32b7","name":"梯形面积","category":"geometry","desc":"两个完全一样的梯形拼成平行四边形，面积 = (上底+下底) × 高 ÷ 2","difficulty":4,"semester":1},{"id":"9a067133","name":"组合图形面积","category":"geometry","desc":"分割法与添补法：将不规则图形分解为学过的图形求面积","difficulty":4,"semester":1},{"id":"5c5b1d29","name":"分数的意义","category":"number_ops","desc":"单位1、分数单位：把整体平均分成若干份，取其中几份","difficulty":4,"semester":2},{"id":"5a92476e","name":"真分数和假分数","category":"number_ops","desc":"真分数<1，假分数≥1；假分数化为带分数","difficulty":4,"semester":2},{"id":"9e90fb97","name":"可能性","category":"applications","desc":"确定事件、不确定事件，用分数表示可能性大小","difficulty":3,"semester":1},{"id":"9724b491","name":"植树问题","category":"applications","desc":"间隔数与棵数的关系：两端都栽、一端不栽、两端都不栽","difficulty":4,"semester":1},{"id":"3896ab4f","name":"分数的基本性质","category":"number_ops","desc":"分子分母同时乘或除以同一个非零数，分数大小不变","difficulty":4,"semester":2},{"id":"   h+='<div class="diag-q">'+(q?q.q:'')+'</div><div class="diag-opts">';
  (q?q.o:[]).forEach((opt,i)=>{
    let cls='';const answered=DIAG_ANSWERED;
    if(answered){if(i===q.a)cls=' diag-correct';else if(prevResult&&prevResult.selected===i)cls=' diag-wrong';else cls=' diag-disabled';}
    h+='<button class="diag-opt'+cls+'"'+(answered?' disabled':' onclick="diagAnswer('+i+')"')+'>'+String.fromCharCode(65+i)+'. '+opt+'</button>';
  });
  h+='</div>';
  if(DIAG_ANSWERED){
    if(prevResult.correct)h+='<div class="diag-feedback correct">✅ 正确！</div>';

  }

  h+='<div class="diag-nav"><button onclick="diagSkip()">跳过 <span class="small">(留空)</span></button>';
  h+='<button onclick="diagNext()">'+(DIAG_IDX<total-1?'下一题':'完成')+' →</button></div>';

function diagUpdateNodeStatus(){
  const vals=Object.values(DIAG_RESULTS);
  const cr=vals.filter(v=>v&&v.correct).length;
  const wr=vals.filter(v=>v&&!v.correct).length;
  const total=DIAG_ORDER.length;
  document.getElementById('diag-score').textContent='✓'+cr+' ✗'+wr+' · 剩余'+(total-Object.keys(DIAG_RESULTS).length);
}
function diagAnswer(idx){
  if(DIAG_ANSWERED)return;
  const nid=DIAG_ORDER[DIAG_IDX];const q=DIAG_QUESTIONS[nid];
  DIAG_RESULTS[nid]={correct:idx===q.a,selected:idx};DIAG_ANSWERED=true;
  saveDiagResults();renderDiag();updateNodeUI();
  if(idx===q.a)setTimeout(()=>{if(DIAG_MODE)diagNext();},800);
}
function diagSkip(){
  DIAG_IDX++;if(DIAG_IDX>=DIAG_ORDER.length)DIAG_IDX=0;

}
function diagNext(){
  if(DIAG_IDX<DIAG_ORDER.length-1){DIAG_IDX++;DIAG_ANSWERED=false;renderDiag();}
  else if(DIAG_IDX>=DIAG_ORDER.length-1){exitDiagMode();}

function diagGetStatus(nid){

function updateNodeUI(){

      if(!badge){

function exportProgress(){
  const data = {
    version:1,
    exportedAt:new Date().toISOString(),
    math5_progress:JSON.parse(localStorage.getItem('math5_progress')||'{}'),
    math5_concept_progress:JSON.parse(localStorage.getItem('math5_concept_progress')||'{}'),
    math5_diag_results:JSON.parse(localStorage.getItem('math5_diag_results')||'{}')
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'math5-progress-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importProgress(event){
  const file = event.target.files[0];
  if(!file)return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.version)throw new Error('Invalid format');
      if(data.math5_progress) localStorage.setItem('math5_progress', JSON.stringify(data.math5_progress));
      if(data.math5_concept_progress) localStorage.setItem('math5_concept_progress', JSON.stringify(data.math5_concept_progress));
      if(data.math5_diag_results) localStorage.setItem('math5_diag_results', JSON.stringify(data.math5_diag_results));
      updateNodeUI();
      alert('✅ 进度导入成功！共导入 ' +
        Object.keys(data.math5_progress||{}).length + ' 课件 + ' +
        Object.keys(data.math5_concept_progress||{}).length + ' 概念 + ' +
        Object.keys(data.math5_diag_results||{}).length + ' 诊断记录。');
    }catch(err){
      alert('❌ 导入失败：文件格式不正确 (' + err.message + ')');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// === URL-based cross-device sync (zero-server) ===
function gatherProgressData(){
  return {
    version:1,
    exportedAt:new Date().toISOString(),
    math5_progress:JSON.parse(localStorage.getItem('math5_progress')||'{}'),
    math5_concept_progress:JSON.parse(localStorage.getItem('math5_concept_progress')||'{}'),
    math5_diag_results:JSON.parse(localStorage.getItem('math5_diag_results')||'{}')
  };
}
function applyProgressData(data){
  if(!data||!data.version)return false;
  if(data.math5_progress) localStorage.setItem('math5_progress', JSON.stringify(data.math5_progress));
  if(data.math5_concept_progress) localStorage.setItem('math5_concept_progress', JSON.stringify(data.math5_concept_progress));
  if(data.math5_diag_results) localStorage.setItem('math5_diag_results', JSON.stringify(data.math5_diag_results));
  updateNodeUI();
  return true;
}
function syncToURL(){
  var json = JSON.stringify(gatherProgressData());
  // Compress with encodeURIComponent + btoa for URL safety
  // For very large data, this may exceed URL length limits; 51 concepts ~5KB fits easily
  var encoded = btoa(unescape(encodeURIComponent(json)));
  var url = location.href.split('#')[0].split('?')[0] + '?sync=' + encoded;
  // Copy to clipboard
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){
      alert('✅ 同步链接已复制到剪贴板！\n\n在另一台设备上打开此链接即可自动恢复进度。\n\n链接长度：' + encoded.length + ' 字符');
    }).catch(function(){
      fallbackCopy(url);
    });
  }else{
    fallbackCopy(url);
  }
}
function fallbackCopy(url){
  var ta = document.createElement('textarea');
  ta.value = url; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try{
    document.execCommand('copy');
    alert('✅ 同步链接已复制！\n\n链接长度：' + url.length + ' 字符');
  }catch(e){
    alert('📋 请手动复制此链接到另一设备打开：\n\n' + url);
  }
  document.body.removeChild(ta);
}
// Auto-import from URL on page load
function checkSyncURL(){
  var params = new URLSearchParams(location.search);
  var syncData = params.get('sync');
  if(!syncData)return;
  try{
    var json = decodeURIComponent(escape(atob(syncData)));
    var data = JSON.parse(json);
    if(applyProgressData(data)){
      var count = Object.keys(data.math5_concept_progress||{}).length;
      // Clear the sync param from URL without reloading
      history.replaceState(null, '', location.pathname + location.hash);
      alert('✅ 跨设备同步成功！已导入 ' + count + ' 个概念的进度数据。');
    }
  }catch(e){
    console.warn('Sync URL parse failed:', e);
  }
}

  // Remove tone marks from pinyin input
  s = s.replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u');
  return s;
}
function fuzzyMatch(text,query){
  if(!query)return true;
  var t = normalizeSearch(text), q = normalizeSearch(query);
  // Exact substring match
  if(t.includes(q))return true;
  // Character-level fuzzy: match each query char in order
  var qi = 0;
  for(var ti=0;ti<t.length&&qi<q.length;ti++){
    if(t[ti]===q[qi])qi++;
  }
  // If 80%+ of query chars matched in order, it's fuzzy match
  return qi >= q.length * 0.8 && qi >= 2;
}
function searchTextFor(d){
  const visual = visualFor(d);
  return normalizeSearch([d.name,d.desc,CAT_NAMES[d.category],SEM_NAMES[d.semester],visual.label,visual.metaphor].join(' '));
}
function matchesSearch(d){
  if(!activeSearch)return true;
  return fuzzyMatch(searchTextFor(d), activeSearch);
}
function passesNodeFilter(d){
  return (activeCat==='all'||d.category===activeCat) && passesSemester(d) && matchesSearch(d);
}
function passesEdgeFilter(e){
  return passesNodeFilter(nodeMap[e.from]) && passesNodeFilter(nodeMap[e.to]);
}
function edgeTouches(e,id){
  return e.from===id || e.to===id;
}
function rankScores(rows){
  const sorted = [...rows].sort((a,b)=>b.score-a.score || a.name.localeCompare(b.name,'zh-CN'));
  return Object.fromEntries(sorted.map((row,index)=>[row.id,index+1]));
}
const directDegree = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>edgeTouches(e,n.id)).length
]));
const prerequisiteCount = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>e.to===n.id).length
]));
const successorCount = Object.fromEntries(nodes.map(n=>[
  n.id,
  edges.filter(e=>e.from===n.id).length
]));
const degreeRank = rankScores(nodes.map(n=>({id:n.id,name:n.name,score:directDegree[n.id]||0})));
const misconceptionRiskScore = Object.fromEntries(nodes.map(n=>{
  const prereq = prerequisiteCount[n.id] || 0;
  const next = successorCount[n.id] || 0;
  const bridge = Math.min(directDegree[n.id] || 0,4) * 0.35;
  return [n.id,Number((n.difficulty*2 + prereq*1.15 + next*1.25 + bridge).toFixed(2))];
}));
const riskRank = rankScores(nodes.map(n=>({id:n.id,name:n.name,score:misconceptionRiskScore[n.id]})));
function lessonPriorityFor(d){
  const degree = degreeRank[d.id] || nodes.length;
  const risk = riskRank[d.id] || nodes.length;
  const best = Math.min(degree,risk);
  if(best <= 10)return {label:'高',key:'high'};
  if(best <= 22)return {label:'中',key:'mid'};
  return {label:'低',key:'low'};
}

function recommendedNextFor(d,limit=3){
  const direct = edges
    .filter(e=>e.from===d.id && e.type==='prerequisite_of')
    .map(e=>({node:nodeMap[e.to],exp:e.exp,kind:'next'}))
    .filter(row=>row.node);
  const related = edges
    .filter(e=>edgeTouches(e,d.id) && e.type==='related_to')
    .map(e=>({node:nodeMap[e.from===d.id?e.to:e.from],exp:e.exp,kind:'related'}))
    .filter(row=>row.node);
  const remedial = edges
    .filter(e=>e.to===d.id && e.type==='prerequisite_of')
    .map(e=>({node:nodeMap[e.from],exp:e.exp,kind:'prereq'}))
    .filter(row=>row.node);
  const seen = new Set([d.id]);
  return [...direct,...related,...remedial]
    .filter(row=>!seen.has(row.node.id) && seen.add(row.node.id))
    .sort((a,b)=>{
      const weight = {next:0,related:1,prereq:2};
      return weight[a.kind]-weight[b.kind] || a.node.difficulty-b.node.difficulty || (degreeRank[a.node.id]||99)-(degreeRank[b.node.id]||99);
    })
    .slice(0,limit);
}
function starterPath(limit=3){
  return nodes
    .filter(n=>prerequisiteCount[n.id]===0)
    .sort((a,b)=>a.difficulty-b.difficulty || (degreeRank[a.id]||99)-(degreeRank[b.id]||99))
    .slice(0,limit)
    .map(node=>({node,exp:'基础入口，先建立全局坐标',kind:'start'}));
}
function pathKindLabel(kind){
  return {next:'下一步',related:'横向连接',prereq:'补前置',start:'起点'}[kind] || '推荐';
}
function lessonPlanFor(d){
  const priority = lessonPriorityFor(d);
  return {
    priority,
    degreeRank:degreeRank[d.id] || nodes.length,
    riskRank:riskRank[d.id] || nodes.length,
    riskScore:misconceptionRiskScore[d.id] || 0
  };
}

// 黑塞式层级布局：按前置依赖计算层级深度
const _prereqEdges = edges.filter(e=>e.type==='prerequisite_of');
const _inDeg = new Map, _outDeg = new Map;
nodes.forEach(n=>{_inDeg.set(n.id,new Set);_outDeg.set(n.id,new Set);});
_prereqEdges.forEach(e=>{_inDeg.get(e.to).add(e.from);_outDeg.get(e.from).add(e.to);});
const _depthMap = new Map, _q = nodes.filter(n=>!_inDeg.get(n.id).size);
_q.forEach(n=>_depthMap.set(n.id,0));
for(let _i=0;_i<_q.length;_i++){
  const d = _depthMap.get(_q[_i].id);
  for(const s of _outDeg.get(_q[_i].id)){
    if(!_depthMap.has(s)||_depthMap.get(s)<d+1){_depthMap.set(s,d+1);_q.push(nodes.find(n=>n.id===s));}
  }
}
nodes.forEach(n=>{if(!_depthMap.has(n.id))_depthMap.set(n.id,0);});
const _maxDepth = Math.max(..._depthMap.values());

// 黑塞式力导向：纵向按深度分层，横向在同层内按类别散开
const _layerH = H / (_maxDepth + 2);
const simulation = d3.forceSimulation(nodes)
  .force('link',d3.forceLink(graphEdges).id(d=>d.id).distance(d=>d.type==='related_to'?72:82).strength(0.35))
  .force('charge',d3.forceManyBody().strength(d=>-100-d.difficulty*15))
  .force('y',d3.forceY(d=>(_depthMap.get(d.id)+1)*_layerH).strength(0.22))
  .force('x',d3.forceX(d=>{
    const same = nodes.filter(n=>_depthMap.get(n.id)===_depthMap.get(d.id)&&n.category===d.category);
    const idx = same.indexOf(d);
    return same.length>1?(W/(same.length+1))*(idx+1):W/2;
  }).strength(0.06))
  .force('collision',d3.forceCollide().radius(d=>18+d.difficulty*2))
  .alphaDecay(0.025);
simulation.stop();
for(let i=0;i<300;i++)simulation.tick();

function showCard(d){
  const cat = CAT_NAMES[d.category];
  const sem = SEM_NAMES[d.semester];
  const color = CAT_COLORS[d.category];
  const visual = visualFor(d);
  const lesson = COURSEWARE_LINKS[d.name];
  const companions = lesson ? (LESSON_CONCEPTS[lesson.href]||[]).filter(n=>n!==d.name) : [];
  const prereqs = edges.filter(e=>e.to===d.id).map(e=>({name:nodeMap[e.from].name,exp:e.exp,cat:nodeMap[e.from].category}));
  const nexts = edges.filter(e=>e.from===d.id).map(e=>({name:nodeMap[e.to].name,exp:e.exp,cat:nodeMap[e.to].category}));
  const relationEdges = edges.filter(e=>edgeTouches(e,d.id));
  const relatedConcepts = [...new Set(relationEdges.map(e=>e.from===d.id?e.to:e.from))].map(id=>nodeMap[id]);

  let header = `<div class="detail-title"><div><h2>${visual.icon} ${d.name}</h2><span class="badge" style="background:${color}">${cat} · ${sem} · ${visual.label}</span></div><button class="close-btn" onclick="closeCard()" aria-label="关闭详情">✕</button></div>`;

    }

  var svgSrc = MathGrade5Concepts && MathGrade5Concepts.svg ? MathGrade5Concepts.svg[d.name] : null;
  if(svgSrc){
    html += `<img class="visual-hero" src="${svgSrc}" alt="${d.name}的数学示意图">`;
    html += `<div class="visual-caption">数学示意图：${visual.label}</div>`;
  }else if(visual.image){
    html += `<img class="visual-hero" src="${visual.image}" alt="${d.name}的视觉隐喻">`;
    html += `<div class="visual-caption">图像隐喻：${visual.label} · ${visual.metaphor}</div>`;
  }else{
    html += `<div class="visual-fallback"><div class="visual-symbol" style="color:${color}">${visual.icon}</div><div class="visual-copy"><strong>${visual.label}</strong><span>${visual.metaphor}</span></div></div>`;
  }
  html += `<p class="core-line"><strong>核心理解：</strong>${d.desc}</p>`;
  html += `<p class="core-line"><strong>视觉模型：</strong>${visual.metaphor}</p>`;
  if(!lesson){
    const plan = lessonPlanFor(d);
    html += `<div class="lesson-note">
      <b>深度课件排期</b>
      <div class="priority-row"><span class="priority-pill ${plan.priority.key}">${plan.priority.label}优先级</span><span>连接度排名 第 ${plan.degreeRank}/${nodes.length}</span></div>
      <div>误区风险排名 第 ${plan.riskRank}/${nodes.length} · 风险评分 ${plan.riskScore}</div>
      <small>误区风险由概念难度、前置依赖、后继概念和图谱连接度推算；接入真实错因数据后再替换为频率排名。</small>
    </div>`;
  }
  html += `<div class="focus-summary">
    <div class="focus-stat"><strong>${relatedConcepts.length}</strong>个相关概念</div>
    <div class="focus-stat"><strong>${relationEdges.length}</strong>条直接关系</div>
  </div>`;
  html += `<p class="core-line">难度：${'⭐'.repeat(d.difficulty)}</p>`;
  html += `<div class="mentor-row">
    <div class="mentor"><img src="assets/portraits/einstein-avatar.webp" alt=""><div><b>对抗式思考</b><span>这句话少了什么条件？能不能举反例？</span></div></div>
    <div class="mentor"><img src="assets/portraits/feynman-avatar.webp" alt=""><div><b>费曼输出</b><span>用一句话讲给低年级同学听。</span></div></div>
  </div>`;

  const pathRows = recommendedNextFor(d,3);
  if(pathRows.length){
    html += `<div class="path-card"><b>学习路径推荐</b><div class="path-list">`;
    pathRows.forEach(row=>{
      const v = visualFor(row.node);
      html += `<button type="button" onclick="focusNodeById('${row.node.id}')">${pathKindLabel(row.kind)} · ${v.icon} ${row.node.name}<span>${row.exp}</span></button>`;
    });

  const relationButton = (other,arrow,exp)=>`<button class="relation-item" type="button" onclick="focusNodeById('${other.id}')"><span class="relation-name" style="color:${CAT_COLORS[other.category]}">${arrow} ${other.name}</span><span class="relation-exp">${exp}</span></button>`;

  if(relationEdges.length>0){

  html += `</div>`;

    .filter(n=>(activeCat==='all'||n.category===activeCat) && passesSemester(n) && matchesSearch(n))
    .sort((a,b)=>{
      const aq = normalizeSearch(a.name).includes(activeSearch) ? 0 : 1;
      const bq = normalizeSearch(b.name).includes(activeSearch) ? 0 : 1;

    const v = visualFor(row.node);
    return `<button type="button" data-id="${row.node.id}">${pathKindLabel(row.kind)} · ${v.icon} ${row.node.name}<span>${row.exp}</span></button>`;
  }).join('')}</div>`;
  panel.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>focusNodeById(btn.dataset.id));
  });
}
function applyGraphState(){
  const focusIds = selectedNodeId ? relationMap.get(selectedNodeId) : null;
  node.attr('class',d=>{
    const visible = passesNodeFilter(d);
    const selected = d.id===selectedNodeId;
    const related = !!focusIds?.has(d.id) && !selected;
    const dimmed = selectedNodeId && !focusIds.has(d.id);
    return ['node-g',selected?'selected':'',related?'related-focus':'',dimmed?'dimmed':'',!visible?'filtered':''].filter(Boolean).join(' ');
  }).style('opacity',d=>{
    const visible = passesNodeFilter(d);
    if(selectedNodeId){
      if(d.id===selectedNodeId)return 1;
      if(focusIds.has(d.id))return visible?0.98:0.45;
      return visible?0.12:0.05;
    }
    return visible?1:0.08;
  });

  link.attr('class',d=>{
    const base = ['edge',d.type==='related_to'?'related':''];
    if(selectedNodeId){
      base.push(edgeTouches(d,selectedNodeId)?'highlighted':'dimmed');
    }
    if(!passesEdgeFilter(d))base.push('filtered');
    return base.filter(Boolean).join(' ');
  }).style('opacity',d=>{
    const visible = passesEdgeFilter(d);
    if(selectedNodeId){
      if(edgeTouches(d,selectedNodeId))return visible?1:0.35;
      return visible?0.07:0.03;
    }
    return visible?1:0.04;
  });
  updateInfo();
  renderPathPanel();
}

function updateInfo(){
  const visibleNodes = nodes.filter(n=>{
    const cm = activeCat==='all'||n.category===activeCat;
    return passesNodeFilter(n);
  }).length;
  const visibleEdges = edges.filter(e=>{
    return passesEdgeFilter(e);
  }).length;
  if(selectedNodeId){
    const selected = nodeMap[selectedNodeId];
    const relationCount = edges.filter(e=>edgeTouches(e,selectedNodeId)).length;
    const relatedCount = Math.max((relationMap.get(selectedNodeId)?.size||1)-1,0);
    document.getElementById('info-bar').textContent = `已聚焦：${selected.name} · ${relatedCount} 个相关概念 · ${relationCount} 条关系`;
  }else{
    document.getElementById('info-bar').textContent = `${visibleNodes} 个概念 · ${visibleEdges} 条依赖`;
  }
}

function renderGraph(){
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
}
simulation.on('tick',renderGraph);
renderGraph();

function fitGraph(duration=800){
  const bounds = g.node().getBBox();
  if(!bounds.width||!bounds.height)return;
  const dx = bounds.width, dy = bounds.height, cx = bounds.x+dx/2, cy = bounds.y+dy/2;
  const w = container.clientWidth || W;
  const h = container.clientHeight || H;
  const compact = w < 720;
  const leftPad = compact ? 18 : 92;
  const rightPad = compact ? 18 : 78;
  const topPad = compact ? 98 : 86;
  const bottomPad = compact ? 88 : 54;
  const innerW = Math.max(260,w-leftPad-rightPad);
  const innerH = Math.max(260,h-topPad-bottomPad);
  const scale = Math.min(innerW/dx,innerH/dy,compact?3.1:2.9)*(compact?1.04:1.02);
  const targetX = leftPad + innerW/2 - scale*cx;
  const targetY = topPad + innerH/2 - scale*cy;
  svg.transition().duration(duration).call(zoom.transform,d3.zoomIdentity.translate(targetX,targetY).scale(scale));
}

simulation.on('end',()=>fitGraph());
// Also try after a fixed timeout as fallback
setTimeout(()=>fitGraph(0),0);
setTimeout(()=>fitGraph(),3000);

d3.select('#zoom-in').on('click',()=>svg.transition().duration(240).call(zoom.scaleBy,1.22));
d3.select('#zoom-out').on('click',()=>svg.transition().duration(240).call(zoom.scaleBy,0.82));
d3.select('#zoom-reset').on('click',()=>fitGraph(500));

document.getElementById('total-nodes').textContent = nodes.length;
document.getElementById('total-edges').textContent = edges.length;
syncControls();
applyGraphState();
const initialFocusName = decodeURIComponent(location.hash.slice(1));
if(initialFocusName){
  const initialNode = nodes.find(n=>n.name===initialFocusName);
  if(initialNode)setTimeout(()=>selectNode(initialNode),120);
}

// Resize
window.addEventListener('resize',()=>{
  const w=container.clientWidth, h=container.clientHeight;
  svg.attr('width',w).attr('height',h);
  const _ly = h / (_maxDepth+2);
  simulation.force('y',d3.forceY(d=>(_depthMap.get(d.id)+1)*_ly).strength(0.22))
    .force('x',d3.forceX(d=>{
      const same=nodes.filter(n=>_depthMap.get(n.id)===_depthMap.get(d.id)&&n.category===d.category);
      const idx=same.indexOf(d);
      return same.length>1?(w/(same.length+1))*(idx+1):w/2;
    }).strength(0.06)).restart();
});
// Apply saved diagnostic results on load
setTimeout(updateNodeUI,200);
</script>
